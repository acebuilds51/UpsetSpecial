<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0A0E16">
<title>Upset Special League</title>
<style>
/* ============================================================
   UPSET SPECIAL LEAGUE — "Night Board"
   A live odds board after dark. Chalk (favorite) is calm and gray;
   the Upset Special burns gold-to-ember. Numbers glow when they move.
   ============================================================ */
:root{
  --void:        #161B27;
  --surface:     #1E2433;
  --surface-2:   #262E40;
  --surface-3:   #2F384C;
  --hairline:    #3A4459;
  --hairline-soft: #1A2030;

  --text:        #E8EAED;
  --text-soft:   #8C97AC;
  --text-faint:  #6E7892;

  --win:         #1ED66B;
  --win-soft:    rgba(30,214,107,0.12);
  --loss:        #FF4D5E;
  --loss-soft:   rgba(255,77,94,0.12);

  --gold:        #F2B632;
  --ember:       #FF6B35;
  --upset-grad:  linear-gradient(135deg, #F2B632 0%, #FF8A3D 55%, #FF4D5E 100%);
  --upset-grad-soft: linear-gradient(135deg, rgba(242,182,50,0.14), rgba(255,77,94,0.10));

  --navy-accent: #4D7CFF;

  --shadow-sm:   0 1px 2px rgba(0,0,0,0.4);
  --shadow-md:   0 6px 20px rgba(0,0,0,0.45);
  --shadow-lg:   0 16px 50px rgba(0,0,0,0.55);
  --glow-gold:   0 0 0 1px rgba(242,182,50,0.4), 0 0 24px rgba(242,182,50,0.18);
  --glow-win:    0 0 0 1px rgba(30,214,107,0.35), 0 0 18px rgba(30,214,107,0.15);

  --radius:      16px;
  --radius-sm:   10px;
  --radius-lg:   22px;

  --font-display: 'Oswald', 'Arial Narrow', sans-serif;
  --font-body:    'Inter', -apple-system, 'Segoe UI', sans-serif;
  --font-mono:    'IBM Plex Mono', 'SF Mono', Consolas, monospace;

  --ease: cubic-bezier(0.22, 1, 0.36, 1);
}

@media (prefers-reduced-motion: reduce){
  *, *::before, *::after{ animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
}

*{ box-sizing:border-box; }
html,body{ margin:0; padding:0; }
body{
  font-family: var(--font-body);
  background: var(--void);
  background-image:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(77,124,255,0.12), transparent 60%),
    radial-gradient(ellipse 700px 400px at 90% 10%, rgba(242,182,50,0.08), transparent 60%);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  min-height:100vh;
  letter-spacing: 0.005em;
}

h1,h2,h3,h4{ font-family: var(--font-display); font-weight:700; margin:0; letter-spacing:0.01em; color: var(--text); }
.mono{ font-family: var(--font-mono); font-variant-numeric: tabular-nums; letter-spacing:0.02em; }

button{ font-family: var(--font-body); cursor:pointer; border:none; color: var(--text); }
input, select{ font-family: var(--font-body); color: var(--text); }
::selection{ background: rgba(242,182,50,0.3); }

/* visible keyboard focus everywhere */
button:focus-visible, input:focus-visible, select:focus-visible, .team-pick:focus-visible, .game-row:focus-visible{
  outline: 2px solid var(--gold); outline-offset: 2px;
}

/* ---------- App shell ---------- */
#app{ max-width: 560px; margin: 0 auto; min-height:100vh; background: transparent; position:relative; padding-bottom: 94px; }
@media (min-width: 700px){ #app{ max-width: 760px; } }

.topbar{
  background: rgba(16,21,31,0.72);
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
  border-bottom: 1px solid var(--hairline);
  color: var(--text);
  padding: 18px 20px 16px;
  position: sticky; top:0; z-index:50;
  display:flex; align-items:center; justify-content:space-between;
}
.topbar .brand{ display:flex; flex-direction:column; gap:2px; }
.topbar-emblem{ display:inline-flex; vertical-align:middle; margin-right:6px; width:20px; height:20px; }
.topbar-emblem svg{ width:20px; height:20px; }
.topbar .brand-name{
  font-family: var(--font-display);
  font-size: 19px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--text);
}
.topbar .brand-name .accent{
  background: var(--upset-grad);
  -webkit-background-clip: text; background-clip:text; color:transparent;
}
.topbar .brand-sub{ font-size:11px; color: var(--text-faint); letter-spacing:0.06em; text-transform:uppercase; margin-top:1px; }
.topbar .who{ text-align:right; font-size:12px; color: var(--text-soft); }
.topbar .who .name{ color: var(--text); font-weight:600; }
.topbar .logout{ background:none; color: var(--text-faint); font-size:11px; text-decoration:underline; padding:3px 0 0; transition: color 0.15s var(--ease); }
.topbar .logout:hover{ color: var(--text-soft); }

.content{ padding: 18px 16px 8px; animation: rise 0.4s var(--ease) both; }
@keyframes rise{ from{ opacity:0; transform: translateY(8px); } to{ opacity:1; transform: translateY(0); } }

/* ---------- Bottom nav ---------- */
.bottomnav{
  position: fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:560px;
  background: rgba(16,21,31,0.85);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  border-top:1px solid var(--hairline);
  display:flex; z-index:50;
}
@media (min-width:700px){ .bottomnav{ max-width:760px; } }
.bottomnav button{
  flex:1; background:none; padding:10px 4px 12px; display:flex; flex-direction:column; align-items:center; gap:4px;
  color: var(--text-faint); font-size:11px; font-weight:600; letter-spacing:0.02em;
  transition: color 0.18s var(--ease), transform 0.12s var(--ease);
}
.bottomnav button:active{ transform: scale(0.92); }
.bottomnav button.active{ color: var(--text); }
.bottomnav button .dot{ width:4px;height:4px;border-radius:50%; background:transparent; transition: background 0.2s var(--ease), box-shadow 0.2s var(--ease); }
.bottomnav button.active .dot{ background: var(--gold); box-shadow: 0 0 8px rgba(242,182,50,0.8); }
.bottomnav button svg{ width:20px; height:20px; transition: transform 0.18s var(--ease); }
.bottomnav button.active svg{ transform: translateY(-1px); }

/* ---------- Cards ---------- */
.card{
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  padding: 16px;
  margin-bottom: 14px;
  transition: border-color 0.2s var(--ease), transform 0.15s var(--ease), box-shadow 0.2s var(--ease);
}
.card-title{ font-size:12px; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-soft); font-weight:700; margin-bottom:10px; }

.section-label{
  font-family: var(--font-display);
  font-size: 12px; text-transform: uppercase; letter-spacing: 0.14em;
  color: var(--text-soft); font-weight:700; margin: 22px 0 10px; display:flex; align-items:center; gap:8px;
}
.section-label::after{ content:''; flex:1; height:1px; background:var(--hairline); }

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  padding: 13px 18px; border-radius: 11px; font-weight:700; font-size:13px;
  font-family: var(--font-display); letter-spacing:0.03em; text-transform:uppercase;
  transition: transform 0.1s var(--ease), opacity 0.15s var(--ease), box-shadow 0.2s var(--ease), filter 0.15s var(--ease);
}
.btn:active{ transform: scale(0.96); }
.btn-primary{ background: var(--surface-3); color: var(--text); border:1px solid var(--hairline); }
.btn-primary:hover{ border-color: var(--navy-accent); }
.btn-primary:disabled{ opacity:0.35; }
.btn-gold{ background: var(--upset-grad); color:#1A1206; box-shadow: 0 4px 18px rgba(242,182,50,0.25); }
.btn-gold:hover{ filter: brightness(1.08); box-shadow: 0 6px 24px rgba(242,182,50,0.35); }
.btn-ghost{ background:transparent; color: var(--text); border:1px solid var(--hairline); }
.btn-ghost:hover{ border-color: var(--text-faint); background: var(--surface-2); }
.btn-danger{ background: var(--loss-soft); color: var(--loss); border:1px solid rgba(255,77,94,0.25); }
.btn-block{ width:100%; }
.btn-sm{ padding:9px 12px; font-size:11px; border-radius:9px; }

/* ---------- Forms ---------- */
.field{ margin-bottom:14px; }
.field label{ display:block; font-size:11px; font-weight:600; color:var(--text-soft); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.05em; }
.field input, .field select{
  width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--hairline);
  font-size:15px; background: var(--surface-2); color: var(--text);
  transition: border-color 0.15s var(--ease), background 0.15s var(--ease);
}
.field input:focus, .field select:focus{ outline:none; border-color: var(--navy-accent); background: var(--surface-3); }
.field input::placeholder{ color: var(--text-faint); }
.row2{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; }

/* ---------- Game row ---------- */
.game-row{
  background: var(--surface); border:1px solid var(--hairline); border-radius: var(--radius);
  padding: 14px; margin-bottom: 10px; position:relative; overflow:hidden;
  transition: border-color 0.25s var(--ease), box-shadow 0.25s var(--ease);
}
.game-row.is-upset-selected{ border-color: rgba(242,182,50,0.5); box-shadow: var(--glow-gold); }
.game-matchup{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
.team-pick{
  flex:1; display:flex; align-items:center; justify-content:space-between; gap:8px;
  padding:11px 12px; border-radius:10px; border:1px solid var(--hairline); background: var(--surface-2);
  cursor:pointer; transition: background 0.15s var(--ease), border-color 0.15s var(--ease), transform 0.1s var(--ease);
}
.team-pick:hover{ border-color: var(--text-faint); }
.team-pick:active{ transform: scale(0.98); }
.team-pick.selected{ background: var(--surface-3); border-color: var(--navy-accent); box-shadow: 0 0 0 1px rgba(77,124,255,0.3); }
.team-pick .tname{ font-weight:700; font-size:14px; color: var(--text); }

.team-logo-row{ display:flex; align-items:center; gap:9px; }
.team-logo{
  width:28px; height:28px; border-radius:50%; flex-shrink:0; object-fit:contain;
  background: var(--surface-3); padding:3px; border:1px solid var(--hairline);
}
.team-logo-fallback{
  width:28px; height:28px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  background: var(--surface-3); border:1px solid var(--hairline); color: var(--text-faint);
}
.team-logo-fallback svg{ width:15px; height:15px; }
.team-pick.selected .team-logo, .team-pick.selected .team-logo-fallback{ border-color: rgba(77,124,255,0.4); }
.team-pick .tline{ font-family: var(--font-mono); font-size:13px; font-weight:600; color:var(--text-soft); }
.team-pick.selected .tline{ color: var(--navy-accent); }
.team-pick .fav-badge{ font-size:9px; text-transform:uppercase; letter-spacing:0.07em; color:var(--gold); font-weight:700; margin-top:2px; }
.vs-divider{ font-family:var(--font-mono); font-size:11px; color:var(--text-faint); font-weight:600; padding-top:14px; }

.upset-toggle{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:11px 12px; border-radius:10px; border:1px dashed rgba(242,182,50,0.4);
  background: var(--upset-grad-soft); margin-top:4px;
  transition: background 0.2s var(--ease), border-color 0.2s var(--ease);
}
.upset-toggle:hover{ border-color: rgba(242,182,50,0.7); }
.upset-toggle.active{ background: var(--upset-grad); border-style:solid; border-color:transparent; box-shadow: var(--glow-gold); }
.upset-toggle .label{ font-size:12px; font-weight:700; color: var(--gold); text-transform:uppercase; letter-spacing:0.04em; display:flex; align-items:center; gap:6px; }
.upset-toggle.active .label{ color:#1A1206; }
.upset-toggle .points{ font-family:var(--font-mono); font-size:13px; font-weight:700; color:var(--gold); }
.upset-toggle.active .points{ color:#1A1206; }
.upset-checkbox{ width:19px; height:19px; border-radius:6px; border:2px solid var(--gold); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:12px; transition: all 0.15s var(--ease); }
.upset-toggle.active .upset-checkbox{ background:#1A1206; border-color:#1A1206; color: var(--gold); }

.result-strip{ display:flex; align-items:center; gap:8px; font-size:12px; margin-top:8px; padding-top:8px; border-top:1px dashed var(--hairline); flex-wrap:wrap; }
.result-pill{ padding:3px 10px; border-radius:20px; font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:0.03em; }
.result-pill.win{ background:var(--win-soft); color:var(--win); }
.result-pill.loss{ background:var(--loss-soft); color:var(--loss); }
.result-pill.pending{ background:var(--surface-2); color:var(--text-soft); }
.result-pill.upset-win{ background: var(--upset-grad); color:#1A1206; }

/* ---------- Standings ---------- */
.standing-row{
  display:flex; align-items:center; gap:12px; padding:13px 6px; border-bottom:1px solid var(--hairline-soft);
  transition: background 0.15s var(--ease);
}
.standing-row:last-child{ border-bottom:none; }
.standing-row:hover{ background: var(--surface-2); border-radius:8px; }
.standing-rank{ font-family:var(--font-display); font-size:18px; font-weight:700; color:var(--text-faint); width:26px; text-align:center; }
.standing-row.rank-1 .standing-rank{ color:var(--gold); text-shadow: 0 0 12px rgba(242,182,50,0.5); }
.standing-row.rank-1{ background: linear-gradient(90deg, rgba(242,182,50,0.06), transparent); border-radius:8px; }
.standing-name{ flex:1; font-weight:600; font-size:14.5px; color: var(--text); }
.standing-meta{ font-size:11px; color:var(--text-faint); margin-top:1px; }
.standing-points{ font-family:var(--font-mono); font-size:18px; font-weight:700; color:var(--text); }
.standing-row.rank-1 .standing-points{ color: var(--gold); }

/* ---------- Misc ---------- */
.pill{ display:inline-block; padding:4px 11px; border-radius:20px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.03em; }
.pill-pending{ background:var(--surface-2); color:var(--text-soft); }
.pill-assigned{ background: rgba(77,124,255,0.14); color:var(--navy-accent); }
.pill-submitted{ background: rgba(242,182,50,0.14); color:var(--gold); }
.pill-posted{ background:var(--win-soft); color:var(--win); }
.empty-state{ text-align:center; padding:44px 20px; color:var(--text-faint); }
.empty-state h3{ color:var(--text-soft); margin-bottom:6px; font-size:16px; }
.empty-state p{ font-size:13px; margin:0; }

.toast{
  position:fixed; bottom:104px; left:50%; transform:translateX(-50%) translateY(8px);
  background: var(--surface-3); color: var(--text); padding:12px 22px; border-radius:30px;
  font-size:13px; font-weight:600; box-shadow:var(--shadow-lg); z-index:200; border:1px solid var(--hairline);
  opacity:0; transition: opacity 0.25s var(--ease), transform 0.25s var(--ease); pointer-events:none;
  max-width:90%; text-align:center;
}
.toast.show{ opacity:1; transform:translate(-50%, 0); }
.toast.error{ background: rgba(255,77,94,0.16); color: var(--loss); border-color: rgba(255,77,94,0.3); }
.toast.success{ background: rgba(30,214,107,0.16); color: var(--win); border-color: rgba(30,214,107,0.3); }

.spinner{ width:18px;height:18px; border-radius:50%; border:2.5px solid rgba(255,255,255,0.2); border-top-color: currentColor; animation: spin 0.7s linear infinite; display:inline-block; }
@keyframes spin{ to{ transform:rotate(360deg); } }

.login-wrap{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
  background: var(--void);
  background-image:
    radial-gradient(ellipse 800px 600px at 30% 0%, rgba(242,182,50,0.12), transparent 55%),
    radial-gradient(ellipse 700px 500px at 80% 100%, rgba(77,124,255,0.14), transparent 55%);
}
.login-card{
  background: var(--surface); border:1px solid var(--hairline); border-radius: var(--radius-lg);
  padding:36px 28px; width:100%; max-width:380px; box-shadow: var(--shadow-lg);
  animation: rise 0.5s var(--ease) both;
}
.login-logo{ text-align:center; margin-bottom:26px; }
.login-emblem{
  display:flex; justify-content:center; margin-bottom:14px;
  filter: drop-shadow(0 6px 18px rgba(242,182,50,0.35));
  animation: emblemFloat 4.5s ease-in-out infinite;
}
@keyframes emblemFloat{ 0%,100%{ transform: translateY(0) rotate(0deg); } 50%{ transform: translateY(-4px) rotate(-3deg); } }
.login-logo .mark{ font-family:var(--font-display); font-size:12px; letter-spacing:0.2em; text-transform:uppercase; color:var(--text-faint); }
.login-logo h1{ font-size:31px; line-height:1.05; margin-top:6px; color: var(--text); }
.login-logo h1 .accent{ background:var(--upset-grad); -webkit-background-clip:text; background-clip:text; color:transparent; }

.tab-row{ display:flex; gap:8px; margin-bottom:16px; }
.tab-row button{ flex:1; padding:10px; border-radius:10px; background:var(--surface-2); color:var(--text-soft); font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:0.03em; border:1px solid transparent; transition: all 0.18s var(--ease); }
.tab-row button:hover{ border-color: var(--hairline); }
.tab-row button.active{ background:var(--surface-3); color:var(--text); border-color: var(--navy-accent); }

.line-badge{ display:inline-flex; align-items:center; gap:4px; font-family:var(--font-mono); font-size:11px; font-weight:700; background:var(--surface-2); padding:4px 10px; border-radius:7px; color:var(--text-soft); border:1px solid var(--hairline); }
.divider{ height:1px; background:var(--hairline); margin:14px 0; }
.helptext{ font-size:12px; color:var(--text-faint); line-height:1.55; }
.flex-between{ display:flex; align-items:center; justify-content:space-between; }
table.simple{ width:100%; border-collapse:collapse; font-size:13px; }
table.simple th{ text-align:left; font-size:10px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-faint); padding:7px 6px; border-bottom:1px solid var(--hairline); }
table.simple td{ padding:10px 6px; border-bottom:1px solid var(--hairline-soft); color: var(--text); }
.editable-line-input{ width:64px; padding:7px 8px; border-radius:7px; border:1px solid var(--hairline); background: var(--surface-2); color: var(--text); font-family:var(--font-mono); text-align:center; }

/* ---------- v2 additions ---------- */
.mode-switch{ display:flex; gap:8px; padding:4px; background:var(--surface); border:1px solid var(--hairline); border-radius:14px; box-shadow:var(--shadow-sm); margin-bottom:14px; }
.mode-switch button{ flex:1; padding:10px; border-radius:11px; font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:0.03em; color:var(--text-soft); background:none; transition: all 0.18s var(--ease); }
.mode-switch button.active{ background:var(--surface-3); color:var(--text); }
.mode-switch button.active.bowl-active{ background:var(--upset-grad); color:#1A1206; }

.countdown{ font-family:var(--font-mono); font-size:11px; font-weight:600; padding:3px 9px; border-radius:7px; background:var(--surface-2); color:var(--text-soft); border:1px solid var(--hairline); display:inline-flex; align-items:center; gap:6px; }
.countdown.urgent{ background:rgba(255,77,94,0.14); color:var(--loss); border-color:rgba(255,77,94,0.3); }
.countdown.urgent::before{ content:''; width:6px; height:6px; border-radius:50%; background:var(--loss); animation: livepulse 1.1s ease-in-out infinite; }
.countdown.locked{ background:var(--surface-2); color:var(--text-faint); }
@keyframes livepulse{ 0%,100%{ opacity:1; transform:scale(1); } 50%{ opacity:0.4; transform:scale(0.7); } }

.team-name-edit{ display:flex; align-items:center; gap:8px; }
.team-name-edit input{ flex:1; padding:9px 11px; border-radius:9px; border:1px solid var(--hairline); background:var(--surface-2); color:var(--text); font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.03em; }

.phase-badge{ display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:20px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; background:var(--upset-grad); color:#1A1206; box-shadow: var(--glow-gold); }
.phase-pts{ font-family:var(--font-mono); font-size:11px; opacity:0.8; }

.search-result-row{ display:flex; align-items:center; justify-content:space-between; padding:11px 13px; border-radius:10px; border:1px solid var(--hairline); margin-bottom:6px; cursor:pointer; background:var(--surface-2); transition: border-color 0.15s var(--ease), background 0.15s var(--ease); }
.search-result-row:hover{ border-color: var(--gold); background: var(--surface-3); }
.search-result-row .matchup{ font-size:13px; font-weight:600; color: var(--text); }
.search-result-row .line{ font-family:var(--font-mono); font-size:12px; color:var(--text-soft); }

.champion-card{ border:1px solid rgba(242,182,50,0.35); border-radius:var(--radius); padding:18px; background: linear-gradient(180deg, rgba(242,182,50,0.07), transparent); box-shadow: var(--glow-gold); }
.champion-team-pick{ padding:15px; border-radius:11px; border:1px solid var(--hairline); margin-bottom:8px; cursor:pointer; font-weight:700; text-align:center; background:var(--surface-2); color: var(--text); transition: all 0.15s var(--ease); }
.champion-team-pick:hover{ border-color: var(--text-faint); }
.champion-team-pick.selected{ background:var(--upset-grad); color:#1A1206; border-color:transparent; box-shadow: var(--glow-gold); }

.auto-default-flag{ font-size:10px; color:var(--text-faint); font-style:italic; margin-left:6px; }

/* number pulse for live-updating values */
.pulse-update{ animation: numPulse 0.6s var(--ease); }
@keyframes numPulse{ 0%{ text-shadow: 0 0 0 transparent; } 30%{ text-shadow: 0 0 16px rgba(242,182,50,0.7); } 100%{ text-shadow: 0 0 0 transparent; } }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<script>
/* ============================================================
   UPSET SPECIAL LEAGUE — App logic v2
   ============================================================ */
const CONFIG = {
  API_URL: 'https://script.google.com/macros/s/AKfycbwFopPwEOEllZV3gpIECbhyCaKt6-57LAFImeRjiaNOoXbttw99n4lzoMT5E7oTRWrt/exec'
};

const State = {
  player: null,
  players: [],
  season: {},
  rotation: [],
  games: [],
  picks: [],
  ledger: [],
  bowlGames: [],
  bowlPicks: [],
  bowlChampion: [],
  bowlLedger: [],
  view: 'home',        // home | slate | standings | money | bowl | admin
  bowlSubView: 'round1' // round1 | quarter | semi | champion | standings
};

async function api(action, payload) {
  payload = payload || {};
  payload.action = action;
  try {
    const resp = await fetch(CONFIG.API_URL, { method: 'POST', body: JSON.stringify(payload) });
    const data = await resp.json();
    if (!data.ok) throw new Error(data.error || 'Request failed');
    return data;
  } catch (err) {
    showToast(err.message || 'Network error', 'error');
    throw err;
  }
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

function saveSession(player) { try { localStorage.setItem('usl_player', JSON.stringify(player)); } catch(e) {} }
function loadSession() { try { return JSON.parse(localStorage.getItem('usl_player') || 'null'); } catch(e) { return null; } }
function clearSession() { try { localStorage.removeItem('usl_player'); } catch(e) {} }

async function boot() {
  const saved = loadSession();
  if (saved) {
    State.player = saved;
    try { await refreshState(); } catch(e) {}
    render();
  } else {
    renderLogin();
  }
}

async function refreshState() {
  const data = await api('getState', {});
  State.players = data.players;
  State.season = seasonArrToObj(data.season);
  State.rotation = data.rotation;
  State.games = data.games;
  State.picks = data.picks;
  State.ledger = data.ledger;
  State.bowlGames = data.bowlGames;
  State.bowlPicks = data.bowlPicks;
  State.bowlChampion = data.bowlChampion;
  State.bowlLedger = data.bowlLedger;
  // refresh logged-in player's own record (team name may have changed elsewhere)
  const me = State.players.find(p => p.id === State.player.id);
  if (me) {
    State.player = { ...State.player, teamName: me.teamName, name: me.name, isAdmin: me.isAdmin, active: me.active };
    saveSession(State.player);
  }
}

function seasonArrToObj(arr) {
  const o = {};
  (arr || []).forEach(r => o[r.key] = r.value);
  return o;
}

document.addEventListener('DOMContentLoaded', boot);

/* ============================================================
   LOGIN
   ============================================================ */
function renderLogin() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="login-wrap">
      <div class="login-card">
        <div class="login-logo">
          <div class="login-emblem">${footballEmblemSvg()}</div>
          <div class="mark">Fantasy College Football</div>
          <h1>UPSET<br><span class="accent">SPECIAL</span> LEAGUE</h1>
        </div>
        <div class="field">
          <label>Name or Team Name</label>
          <input id="login-name" type="text" placeholder="e.g. Jeff Wilkerson or VOLZ" autocomplete="name">
        </div>
        <div class="field">
          <label>PIN</label>
          <input id="login-pin" type="password" inputmode="numeric" placeholder="PIN" maxlength="6">
        </div>
        <button class="btn btn-primary btn-block" id="login-btn">Log In</button>
        <p class="helptext" style="text-align:center; margin-top:14px;">Don't have a PIN yet? Ask your league admin to add you.</p>
      </div>
    </div>
  `;
  document.getElementById('login-btn').onclick = doLogin;
  document.getElementById('login-pin').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
}

async function doLogin() {
  const name = document.getElementById('login-name').value.trim();
  const pin = document.getElementById('login-pin').value.trim();
  if (!name || !pin) { showToast('Enter your name and PIN', 'error'); return; }
  const btn = document.getElementById('login-btn');
  btn.innerHTML = '<span class="spinner"></span>';
  try {
    const data = await api('login', { name, pin });
    State.player = data.player;
    saveSession(data.player);
    // render immediately so the player isn't stuck on the login screen while
    // the full state loads -- refreshState runs in the background and the content
    // area shows its own spinner while it completes
    render();
    try {
      await refreshState();
      renderContent();
    } catch(e) {
      // state load failed after login -- show home anyway with a warning
      showToast('Logged in, but failed to load data. Check your connection.', 'error');
      renderContent();
    }
  } catch (e) {
    btn.innerHTML = 'Log In';
  }
}

function logout() {
  clearSession();
  State.player = null;
  renderLogin();
}

/* ============================================================
   MAIN SHELL / NAV
   ============================================================ */
function render() {
  const app = document.getElementById('app');
  const p = State.player;
  app.innerHTML = `
    <div class="topbar">
      <div class="brand">
        <div class="brand-name"><span class="topbar-emblem">${footballEmblemSvg()}</span>UPSET <span class="accent">SPECIAL</span></div>
        <div class="brand-sub">${escapeHtml(State.season.leagueName || 'League')} &middot; ${State.season.year || ''}</div>
      </div>
      <div class="who">
        <div class="name">${escapeHtml(p.teamName || p.name)}${p.isAdmin ? ' <span style="opacity:0.6">(Admin)</span>' : ''}</div>
        <button class="logout" id="logout-btn">Log out</button>
      </div>
    </div>
    <div class="content" id="content"></div>
    <div class="bottomnav" id="bottomnav"></div>
  `;
  document.getElementById('logout-btn').onclick = logout;
  renderBottomNav();
  renderContent();
}

function renderBottomNav() {
  const nav = document.getElementById('bottomnav');
  const items = [
    { id: 'home', label: 'Home', icon: iconHome() },
    { id: 'slate', label: 'This Week', icon: iconSlate() },
    { id: 'standings', label: 'Standings', icon: iconStandings() },
    { id: 'bowl', label: 'Bowl', icon: iconBowl() },
    { id: 'money', label: 'Pot', icon: iconMoney() }
  ];
  if (State.player.isAdmin) items.push({ id: 'admin', label: 'Admin', icon: iconAdmin() });
  nav.innerHTML = items.map(it => `
    <button data-view="${it.id}" class="${State.view === it.id ? 'active' : ''}">
      ${it.icon}
      <span class="dot"></span>
      ${it.label}
    </button>
  `).join('');
  nav.querySelectorAll('button').forEach(btn => {
    btn.onclick = () => { State.view = btn.dataset.view; renderBottomNav(); renderContent(); };
  });
}

async function renderContent() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="empty-state"><span class="spinner" style="border-top-color:var(--gold); border-color:rgba(255,255,255,0.08);"></span></div>';
  try { await refreshState(); } catch(e) {}
  switch (State.view) {
    case 'home': renderHome(content); break;
    case 'slate': renderSlate(content); break;
    case 'standings': renderStandings(content); break;
    case 'money': renderMoney(content); break;
    case 'bowl': renderBowl(content); break;
    case 'admin': renderAdmin(content); break;
    default: renderHome(content);
  }
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- Icons ---------- */
function iconHome(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11l9-7 9 7"/><path d="M5 10v9h14v-9"/></svg>`; }
function iconSlate(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="15" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>`; }
function iconStandings(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 21V10M12 21V3M19 21v-7"/></svg>`; }
function iconMoney(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M9.5 9.5c0-1.1 1.1-2 2.5-2s2.5.9 2.5 2-1.1 1.6-2.5 2-2.5.9-2.5 2 1.1 2 2.5 2 2.5-.9 2.5-2"/></svg>`; }
function iconAdmin(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2l3 5 5 1-4 4 1 6-5-3-5 3 1-6-4-4 5-1z"/></svg>`; }
function iconBowl(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 12a8 4 0 0016 0"/><path d="M4 12V8a8 4 0 0116 0v4"/><circle cx="12" cy="6" r="1.2" fill="currentColor" stroke="none"/></svg>`; }

/* football icon used as a fallback wherever a team has no matched ESPN logo */
function iconFootball(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><ellipse cx="12" cy="12" rx="9" ry="6" transform="rotate(45 12 12)"/><path d="M8 8l8 8M9.5 6.5l-1 1M15.5 17.5l-1 1M6.5 9.5l1-1M17.5 14.5l1-1" stroke-width="1.3"/></svg>`; }

/* renders a team logo <img> if a URL is available, with a graceful football-icon fallback both for
   missing URLs and for URLs that fail to load (404, network hiccup, etc). The onerror handler swaps
   the broken <img> for the fallback markup in place, so users never see a broken-image glyph. */
function renderTeamLogo(logoUrl, teamName) {
  const fallback = `<span class="team-logo-fallback">${iconFootball()}</span>`;
  if (!logoUrl) return fallback;
  const safeUrl = escapeHtml(logoUrl);
  const safeAlt = escapeHtml(teamName || '');
  // the inline onerror replaces this exact img with the same fallback markup, escaping quotes for the attribute
  const fallbackEscaped = fallback.replace(/"/g, '&quot;');
  return `<img class="team-logo" src="${safeUrl}" alt="${safeAlt}" loading="lazy" onerror="this.outerHTML='${fallbackEscaped}'">`;
}

/* hand-drawn illustrated football emblem (laces, stitching, gradient leather) used as branding on the
   login screen and home header -- this is vector art, not a photo, so it never depends on network access */
function footballEmblemSvg() {
  return `
  <svg viewBox="0 0 120 120" width="64" height="64" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="ballGrad" x1="15%" y1="10%" x2="85%" y2="90%">
        <stop offset="0%" stop-color="#3A2A18"/>
        <stop offset="45%" stop-color="#5C4226"/>
        <stop offset="100%" stop-color="#7A5832"/>
      </linearGradient>
      <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#F2B632"/>
        <stop offset="55%" stop-color="#FF8A3D"/>
        <stop offset="100%" stop-color="#FF4D5E"/>
      </linearGradient>
    </defs>
    <ellipse cx="60" cy="62" rx="46" ry="46" fill="none" stroke="url(#ringGrad)" stroke-width="2.5" opacity="0.55"/>
    <g transform="rotate(45 60 60)">
      <ellipse cx="60" cy="60" rx="40" ry="26" fill="url(#ballGrad)"/>
      <ellipse cx="60" cy="60" rx="40" ry="26" fill="none" stroke="#241808" stroke-width="1.4" opacity="0.6"/>
      <path d="M22 60 Q60 44 98 60" stroke="#241808" stroke-width="1.3" fill="none" opacity="0.55"/>
      <path d="M22 60 Q60 76 98 60" stroke="#241808" stroke-width="1.3" fill="none" opacity="0.55"/>
      <line x1="48" y1="60" x2="72" y2="60" stroke="#1A1206" stroke-width="3.2" stroke-linecap="round"/>
      <line x1="52" y1="55" x2="52" y2="65" stroke="#1A1206" stroke-width="2" stroke-linecap="round"/>
      <line x1="58" y1="55" x2="58" y2="65" stroke="#1A1206" stroke-width="2" stroke-linecap="round"/>
      <line x1="64" y1="55" x2="64" y2="65" stroke="#1A1206" stroke-width="2" stroke-linecap="round"/>
      <line x1="68" y1="55" x2="68" y2="65" stroke="#1A1206" stroke-width="2" stroke-linecap="round"/>
    </g>
  </svg>`;
}

/* ============================================================
   SHARED HELPERS
   ============================================================ */
function currentWeek() { return Number(State.season.currentWeek || 1); }
function getRotationForWeek(week) { return (State.rotation || []).find(r => Number(r.week) === Number(week)); }
function getPlayerById(id) { return (State.players || []).find(p => p.id === id); }
function getGamesForWeek(week) { return (State.games || []).filter(g => Number(g.week) === Number(week)); }
function isWeekPosted(week) {
  const games = getGamesForWeek(week);
  return games.length > 0 && games.every(g => g.locked === true || g.locked === 'TRUE');
}
function getMyPicksForWeek(week) { return (State.picks || []).filter(p => Number(p.week) === Number(week) && p.playerId === State.player.id); }
function isFavorite(game, team) { return String(game.favorite || '').trim() === String(team || '').trim(); }
function underdogOf(game) { return isFavorite(game, game.homeTeam) ? game.awayTeam : game.homeTeam; }
function fmtSpread(n) {
  const v = Number(n);
  if (isNaN(v)) return '—';
  return (v % 1 === 0 ? v.toFixed(0) : v.toFixed(1));
}
function isGameFinal(g) { return g.isFinal === true || g.isFinal === 'TRUE'; }
function isGameLocked(g) { return g.locked === true || g.locked === 'TRUE'; }
function computeGameResult(g) {
  if (!isGameFinal(g)) return { isFinal: false };
  const homeScore = Number(g.finalHomeScore), awayScore = Number(g.finalAwayScore);
  const winner = homeScore > awayScore ? g.homeTeam : (awayScore > homeScore ? g.awayTeam : null);
  return { isFinal: true, homeScore, awayScore, winner };
}

/* kickoff-based lock/reveal helpers */
function msUntilLock(game) {
  if (isGameFinal(game)) return -1; // a final game is always locked, regardless of kickoff data
  if (!game.kickoff) return Infinity; // no kickoff data yet = treat as not locked
  const lockTime = new Date(game.kickoff).getTime() - 5 * 60 * 1000;
  return lockTime - Date.now();
}
function isGamePickLocked(game) { return isGameFinal(game) || msUntilLock(game) <= 0; }
function isGameStarted(game) {
  if (isGameFinal(game)) return true;
  if (!game.kickoff) return false;
  return Date.now() >= new Date(game.kickoff).getTime();
}
function formatCountdown(ms) {
  if (ms <= 0) return 'Locked';
  const totalMin = Math.floor(ms / 60000);
  const days = Math.floor(totalMin / 1440);
  const hours = Math.floor((totalMin % 1440) / 60);
  const mins = totalMin % 60;
  if (days > 0) return `${days}d ${hours}h`;
  if (hours > 0) return `${hours}h ${mins}m`;
  return `${mins}m`;
}
function renderCountdownBadge(game) {
  const ms = msUntilLock(game);
  if (ms <= 0) return `<span class="countdown locked">Locked</span>`;
  const urgent = ms < 30 * 60 * 1000;
  return `<span class="countdown ${urgent ? 'urgent' : ''}">${formatCountdown(ms)} to lock</span>`;
}
</script>
<script>
/* ============================================================
   HOME VIEW
   ============================================================ */
function renderHome(content) {
  const week = currentWeek();
  const rotation = getRotationForWeek(week);
  const picker = rotation ? getPlayerById(rotation.playerId) : null;
  const games = getGamesForWeek(week);
  const posted = isWeekPosted(week);
  const myPicks = getMyPicksForWeek(week);
  const havePicked = myPicks.filter(p => !(p.isUpset === true || p.isUpset === 'TRUE')).length === 10
    && myPicks.some(p => p.isUpset === true || p.isUpset === 'TRUE');

  let statusCard = '';
  if (!rotation) {
    statusCard = `
      <div class="card">
        <div class="card-title">Week ${week}</div>
        <div class="empty-state" style="padding:20px 0;">
          <h3>No picker assigned yet</h3>
          <p>${State.player.isAdmin ? 'Head to Admin to assign or randomly select this week\'s picker.' : 'Check back once the commissioner assigns this week\'s picker.'}</p>
        </div>
      </div>`;
  } else if (!posted) {
    const pickerName = picker ? (picker.teamName || picker.name) : '—';
    statusCard = `
      <div class="card">
        <div class="card-title">Week ${week}</div>
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
          <span class="pill ${rotation.status === 'submitted' ? 'pill-submitted' : 'pill-assigned'}">${rotation.status === 'submitted' ? 'Slate Submitted' : 'Awaiting Slate'}</span>
        </div>
        <p class="helptext">This week's picker is <strong>${escapeHtml(pickerName)}</strong>.
        ${rotation.status === 'submitted' ? 'Their 10 games are in — waiting on the commissioner to set lines and post.' : 'Waiting on their 10 game picks.'}</p>
      </div>`;
  } else {
    const pickerName = picker ? (picker.teamName || picker.name) : '—';
    statusCard = `
      <div class="card">
        <div class="card-title">Week ${week} &middot; Picker: ${escapeHtml(pickerName)}</div>
        <span class="pill pill-posted">Slate Posted</span>
        <div class="divider"></div>
        ${havePicked
          ? `<p class="helptext"><strong style="color:var(--win)">You're in.</strong> You can still update individual picks until 5 minutes before each game's kickoff.</p>
             <button class="btn btn-ghost btn-block" style="margin-top:10px;" onclick="goToView('slate')">View / Edit Picks</button>`
          : `<p class="helptext">The board is open. Make your 10 picks plus your Upset Special before each game locks (5 min before kickoff).</p>
             <button class="btn btn-gold btn-block" style="margin-top:10px;" onclick="goToView('slate')">Make Your Picks</button>`}
      </div>`;
  }

  content.innerHTML = `
    ${statusCard}
    <div class="section-label">Your Team</div>
    <div class="card">
      <div class="team-name-edit">
        <input id="team-name-input" type="text" value="${escapeHtml(State.player.teamName || State.player.name)}" maxlength="30">
        <button class="btn btn-ghost btn-sm" id="save-team-name-btn">Save</button>
      </div>
      <p class="helptext" style="margin-top:8px;">This is your display name across the league — change it whenever you want.</p>
    </div>
    <div class="section-label">Quick Look</div>
    <div class="card" style="display:flex; gap:14px;">
      <div style="flex:1; text-align:center;">
        <div class="mono" style="font-size:22px; font-weight:700; color:var(--surface-3);">${games.length}</div>
        <div class="helptext">Games This Week</div>
      </div>
      <div style="flex:1; text-align:center; border-left:1px solid var(--hairline); border-right:1px solid var(--hairline);">
        <div class="mono" style="font-size:22px; font-weight:700; color:var(--surface-3);">${week}</div>
        <div class="helptext">Current Week</div>
      </div>
      <div style="flex:1; text-align:center;">
        <div class="mono" style="font-size:22px; font-weight:700; color:var(--surface-3);">$${Number(State.season.entryFee || 0)}</div>
        <div class="helptext">Entry Fee</div>
      </div>
    </div>
    <div class="section-label">How Scoring Works</div>
    <div class="card">
      <p class="helptext"><strong style="color:var(--text)">Straight picks:</strong> 1 point for each of your 10 correct picks against the posted opening line.</p>
      <p class="helptext" style="margin-top:8px;"><strong style="color:var(--gold)">Upset Special:</strong> pick any underdog from <em>any</em> game that week — not just the 10 on the board — to win outright. Get it right and you score points equal to that line.</p>
      <p class="helptext" style="margin-top:8px;">Picks lock per-game, 5 minutes before kickoff. Everyone's picks for a game stay hidden until that game kicks off.</p>
    </div>
    <div class="section-label">Bowl Bonanza</div>
    <div class="card">
      <p class="helptext">The season-ending bowl contest is a separate competition with its own pot. Head to the <strong>Bowl</strong> tab to make your picks once it's live.</p>
      <button class="btn btn-ghost btn-block" style="margin-top:10px;" onclick="goToView('bowl')">Go to Bowl Bonanza</button>
    </div>
  `;
  document.getElementById('save-team-name-btn').onclick = saveTeamName;
}

async function saveTeamName() {
  const newName = document.getElementById('team-name-input').value.trim();
  if (!newName) { showToast('Team name cannot be empty', 'error'); return; }
  try {
    await api('updateTeamName', { playerId: State.player.id, teamName: newName });
    State.player.teamName = newName;
    saveSession(State.player);
    showToast('Team name updated', 'success');
    render();
  } catch (e) {}
}

function goToView(view) {
  State.view = view;
  renderBottomNav();
  renderContent();
}
</script>
<script>
/* ============================================================
   SLATE / PICKS VIEW (regular season)
   ============================================================ */
let _draftPicks = {};       // gameId -> {pickedTeam, isUpset}
let _draftSlateGames = [];  // picker submission draft
let _upsetMode = 'board';   // 'board' (pick from the 10) | 'search' (any game)
let _upsetSearchResults = [];
let _upsetSelection = null; // {espnEventId, awayTeam, homeTeam, favorite, spread, kickoff, pickedTeam} when from search

function renderSlate(content) {
  const week = currentWeek();
  const rotation = getRotationForWeek(week);
  const games = getGamesForWeek(week);
  const posted = isWeekPosted(week);
  const isPicker = rotation && rotation.playerId === State.player.id;

  if (!rotation) {
    content.innerHTML = `<div class="empty-state"><h3>No picker assigned</h3><p>The commissioner hasn't assigned this week's picker yet.</p></div>`;
    return;
  }
  if (!posted && isPicker && rotation.status !== 'submitted') {
    renderPickerSubmissionForm(content, week);
    return;
  }
  if (!posted) {
    const picker = getPlayerById(rotation.playerId);
    const pickerName = picker ? (picker.teamName || picker.name) : 'This week\'s picker';
    content.innerHTML = `
      <div class="empty-state">
        <h3>Board not posted yet</h3>
        <p>${escapeHtml(pickerName)} has ${rotation.status === 'submitted' ? 'submitted their 10 games — waiting on the commissioner to set lines and post the board.' : 'not yet submitted their 10 games.'}</p>
      </div>`;
    return;
  }
  renderPicksBoard(content, week, games);
}

/* ---- Picker's submission form ---- */
function renderPickerSubmissionForm(content, week) {
  if (_draftSlateGames.length === 0) _draftSlateGames = Array.from({length: 10}, () => ({ awayTeam: '', homeTeam: '' }));
  content.innerHTML = `
    <div class="card">
      <div class="card-title">You're the Picker — Week ${week}</div>
      <p class="helptext">Enter the 10 games you want on the board. The commissioner will attach opening lines and kickoff times, then post it for everyone to pick against.</p>
    </div>
    <div id="slate-form-games"></div>
    <button class="btn btn-primary btn-block" id="submit-slate-btn" style="margin-top:6px;">Submit My 10 Games</button>
  `;
  renderSlateFormGames();
  document.getElementById('submit-slate-btn').onclick = submitSlate;
}

function renderSlateFormGames() {
  const wrap = document.getElementById('slate-form-games');
  wrap.innerHTML = _draftSlateGames.map((g, i) => `
    <div class="card" style="padding:12px 14px;">
      <div class="helptext" style="margin-bottom:6px; font-weight:700;">GAME ${i + 1}</div>
      <div class="row2">
        <div class="field" style="margin-bottom:0;"><label>Away Team</label><input type="text" value="${escapeHtml(g.awayTeam)}" data-idx="${i}" data-field="awayTeam" placeholder="e.g. Michigan"></div>
        <div class="field" style="margin-bottom:0;"><label>Home Team</label><input type="text" value="${escapeHtml(g.homeTeam)}" data-idx="${i}" data-field="homeTeam" placeholder="e.g. Ohio State"></div>
      </div>
    </div>
  `).join('');
  wrap.querySelectorAll('input').forEach(inp => {
    inp.oninput = () => { _draftSlateGames[Number(inp.dataset.idx)][inp.dataset.field] = inp.value; };
  });
}

async function submitSlate() {
  const week = currentWeek();
  const cleaned = _draftSlateGames.map(g => ({ awayTeam: g.awayTeam.trim(), homeTeam: g.homeTeam.trim() }));
  if (cleaned.some(g => !g.awayTeam || !g.homeTeam)) { showToast('Fill in all 10 matchups before submitting', 'error'); return; }
  const btn = document.getElementById('submit-slate-btn');
  btn.innerHTML = '<span class="spinner" style="border-top-color:#fff;"></span>';
  try {
    await api('submitSlate', { week, games: cleaned });
    showToast('Slate submitted to the commissioner', 'success');
    _draftSlateGames = [];
    await renderContent();
  } catch (e) { btn.innerHTML = 'Submit My 10 Games'; }
}

/* ---- Posted board: players make their picks ---- */
function renderPicksBoard(content, week, games) {
  const existingPicks = getMyPicksForWeek(week);
  if (existingPicks.length > 0 && Object.keys(_draftPicks).length === 0) {
    existingPicks.forEach(p => {
      const isUpset = p.isUpset === true || p.isUpset === 'TRUE';
      _draftPicks[p.gameId] = { pickedTeam: p.pickedTeam, isUpset };
      if (isUpset && !games.find(g => g.gameId === p.gameId)) {
        // upset pick references a game outside this week's 10 -- find it in State.games to show details
        const extGame = State.games.find(g => g.gameId === p.gameId);
        if (extGame) {
          _upsetSelection = { espnEventId: extGame.espnEventId, awayTeam: extGame.awayTeam, homeTeam: extGame.homeTeam, favorite: extGame.favorite, spread: extGame.spread, kickoff: extGame.kickoff, pickedTeam: p.pickedTeam, gameId: extGame.gameId, homeLogo: extGame.homeLogo, awayLogo: extGame.awayLogo };
          _upsetMode = 'search';
        }
      }
    });
  }

  const straightCount = Object.keys(_draftPicks).filter(gid => _draftPicks[gid].pickedTeam && !_draftPicks[gid].isUpset).length;
  const hasUpset = Object.keys(_draftPicks).some(gid => _draftPicks[gid].isUpset) || _upsetSelection;

  content.innerHTML = `
    <div class="card" style="background:var(--surface-3); color:#fff;">
      <div class="flex-between">
        <div>
          <div style="font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:rgba(255,255,255,0.6);">Week ${week} Board</div>
          <div id="picked-count-display" style="font-family:var(--font-display); font-size:18px; margin-top:2px;">${straightCount} / 10 picked</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:rgba(255,255,255,0.6);">Upset Special</div>
          <div id="upset-status-display" style="font-family:var(--font-display); font-size:18px; margin-top:2px; color:var(--gold);">${hasUpset ? 'Selected' : 'Not Set'}</div>
        </div>
      </div>
    </div>
    <div id="games-board"></div>
    <div class="section-label">Upset Special</div>
    <div class="card">
      <div class="tab-row">
        <button data-upsetmode="board" class="${_upsetMode === 'board' ? 'active' : ''}">From This Week's 10</button>
        <button data-upsetmode="search" class="${_upsetMode === 'search' ? 'active' : ''}">Search Any Game</button>
      </div>
      <div id="upset-search-area"></div>
    </div>
    <button class="btn btn-gold btn-block" id="submit-picks-btn" style="margin-top:6px;">
      ${existingPicks.length > 0 ? 'Update My Picks' : 'Submit My Picks'}
    </button>
    <p class="helptext" style="text-align:center; margin-top:10px;">Each game locks individually, 5 minutes before its kickoff. Picks for a game stay hidden from other players until that game kicks off.</p>
  `;
  renderGamesBoard(games, week);
  renderUpsetSearchArea(week, games);
  content.querySelectorAll('[data-upsetmode]').forEach(btn => {
    btn.onclick = () => { _upsetMode = btn.dataset.upsetmode; renderPicksBoard(content, week, games); };
  });
  document.getElementById('submit-picks-btn').onclick = () => submitMyPicks(week, games);
}

function renderGamesBoard(games, week) {
  const wrap = document.getElementById('games-board');
  wrap.innerHTML = games.map(g => {
    const draft = _draftPicks[g.gameId] || {};
    const favTeam = g.favorite;
    const result = computeGameResult(g);
    const locked = isGamePickLocked(g);
    const started = isGameStarted(g);
    const awaySelected = draft.pickedTeam === g.awayTeam && !draft.isUpset;
    const homeSelected = draft.pickedTeam === g.homeTeam && !draft.isUpset;
    const isUpsetOnThisGame = draft.isUpset && draft.pickedTeam;

    let resultStrip = '';
    if (result.isFinal) {
      resultStrip = `
        <div class="result-strip">
          <span class="mono" style="color:var(--text-soft);">${escapeHtml(g.awayTeam)} ${result.awayScore} – ${result.homeScore} ${escapeHtml(g.homeTeam)}</span>
          ${draft.pickedTeam ? `<span class="result-pill ${draft.isUpset ? (result.winner === draft.pickedTeam ? 'upset-win' : 'loss') : (result.winner === draft.pickedTeam ? 'win' : 'loss')}">
            ${draft.isUpset ? (result.winner === draft.pickedTeam ? 'Upset hit +' + fmtSpread(g.spread) : 'Upset miss') : (result.winner === draft.pickedTeam ? 'Correct +1' : 'Incorrect')}
          </span>` : ''}
        </div>`;
    } else if (started) {
      // game has started but not final -- reveal everyone's picks for this game
      resultStrip = renderRevealedPicksForGame(g);
    }

    return `
      <div class="game-row ${isUpsetOnThisGame ? 'is-upset-selected' : ''}" data-gameid="${g.gameId}">
        <div class="flex-between" style="margin-bottom:6px;">
          ${renderCountdownBadge(g)}
        </div>
        <div class="game-matchup">
          <div class="team-pick ${awaySelected ? 'selected' : ''} ${locked ? 'is-locked' : ''}" data-gameid="${g.gameId}" data-team="${escapeHtml(g.awayTeam)}" style="${locked ? 'opacity:0.55; cursor:default;' : ''}">
            <div class="team-logo-row">
              ${renderTeamLogo(g.awayLogo, g.awayTeam)}
              <div><div class="tname">${escapeHtml(g.awayTeam)}</div>${favTeam === g.awayTeam ? '<div class="fav-badge">Favorite</div>' : ''}</div>
            </div>
            <div class="tline">${favTeam === g.awayTeam ? '-' + fmtSpread(g.spread) : (favTeam ? '+' + fmtSpread(g.spread) : '—')}</div>
          </div>
          <div class="vs-divider">@</div>
          <div class="team-pick ${homeSelected ? 'selected' : ''} ${locked ? 'is-locked' : ''}" data-gameid="${g.gameId}" data-team="${escapeHtml(g.homeTeam)}" style="${locked ? 'opacity:0.55; cursor:default;' : ''}">
            <div class="team-logo-row">
              ${renderTeamLogo(g.homeLogo, g.homeTeam)}
              <div><div class="tname">${escapeHtml(g.homeTeam)}</div>${favTeam === g.homeTeam ? '<div class="fav-badge">Favorite</div>' : ''}</div>
            </div>
            <div class="tline">${favTeam === g.homeTeam ? '-' + fmtSpread(g.spread) : (favTeam ? '+' + fmtSpread(g.spread) : '—')}</div>
          </div>
        </div>
        ${resultStrip}
      </div>
    `;
  }).join('');

  wrap.querySelectorAll('.team-pick').forEach(el => {
    if (el.style.cursor === 'default') return;
    el.onclick = () => {
      const gameId = el.dataset.gameid;
      const team = el.dataset.team;
      const game = games.find(g => g.gameId === gameId);
      if (isGamePickLocked(game)) { showToast('This game has locked', 'error'); return; }
      if (!_draftPicks[gameId]) _draftPicks[gameId] = {};
      _draftPicks[gameId].pickedTeam = team;
      _draftPicks[gameId].isUpset = false; // straight picks from the board are never the upset
      renderGamesBoard(games, week);
      updateBoardHeader();
    };
  });
}

function renderRevealedPicksForGame(g) {
  const picksForGame = State.picks.filter(p => p.gameId === g.gameId);
  if (picksForGame.length === 0) return '<div class="result-strip"><span class="helptext">No picks revealed yet.</span></div>';
  const rows = picksForGame.map(p => {
    const player = getPlayerById(p.playerId);
    const isUpset = p.isUpset === true || p.isUpset === 'TRUE';
    return `<div style="display:flex; justify-content:space-between; font-size:12px; padding:3px 0;">
      <span>${escapeHtml(player ? (player.teamName || player.name) : '—')}</span>
      <span class="mono" style="color:${isUpset ? 'var(--gold)' : 'var(--text-soft)'};">${escapeHtml(p.pickedTeam)}${isUpset ? ' ⭐' : ''}</span>
    </div>`;
  }).join('');
  return `<div class="result-strip" style="flex-direction:column; align-items:stretch;"><div class="helptext" style="margin-bottom:4px; font-weight:700;">Picks revealed:</div>${rows}</div>`;
}

function renderUpsetSearchArea(week, games) {
  const area = document.getElementById('upset-search-area');
  if (_upsetMode === 'board') {
    area.innerHTML = games.map(g => {
      const draft = _draftPicks[g.gameId] || {};
      const dog = underdogOf(g);
      const active = draft.isUpset && draft.pickedTeam === dog;
      const locked = isGamePickLocked(g);
      return `
        <div class="upset-toggle ${active ? 'active' : ''}" data-gameid="${g.gameId}" data-dog="${escapeHtml(dog)}" style="${locked ? 'opacity:0.5;' : ''}">
          <div class="label"><span class="upset-checkbox">${active ? '✓' : ''}</span> ${escapeHtml(dog)} (underdog)</div>
          <div class="points">+${fmtSpread(g.spread)} pts</div>
        </div>`;
    }).join('');
    area.querySelectorAll('.upset-toggle').forEach(el => {
      el.onclick = () => {
        const gameId = el.dataset.gameid;
        const dog = el.dataset.dog;
        const game = games.find(g => g.gameId === gameId);
        if (isGamePickLocked(game)) { showToast('This game has locked', 'error'); return; }
        const wasActive = _draftPicks[gameId] && _draftPicks[gameId].isUpset;
        clearAllUpsetFlags();
        _upsetSelection = null;
        if (!wasActive) {
          if (!_draftPicks[gameId]) _draftPicks[gameId] = {};
          _draftPicks[gameId].pickedTeam = dog;
          _draftPicks[gameId].isUpset = true;
        }
        renderPicksBoard(document.getElementById('content'), week, games);
      };
    });
  } else {
    area.innerHTML = `
      <div class="field" style="margin-bottom:8px;">
        <input type="text" id="upset-search-input" placeholder="Search any team playing this week..." value="">
      </div>
      <div id="upset-search-results"></div>
      ${_upsetSelection ? `
        <div class="card" style="background:var(--surface-2); margin-top:8px;">
          <div class="helptext" style="font-weight:700; margin-bottom:6px;">Your Upset Special pick:</div>
          <div class="flex-between">
            <span style="font-weight:700; display:flex; align-items:center; gap:8px;">
              ${renderTeamLogo(_upsetSelection.pickedTeam === _upsetSelection.homeTeam ? _upsetSelection.homeLogo : _upsetSelection.awayLogo, _upsetSelection.pickedTeam)}
              ${escapeHtml(_upsetSelection.pickedTeam)}
            </span>
            <span class="mono">+${fmtSpread(_upsetSelection.spread)} pts</span>
          </div>
          <div class="helptext" style="margin-top:6px;">${escapeHtml(_upsetSelection.awayTeam)} @ ${escapeHtml(_upsetSelection.homeTeam)}</div>
          <button class="btn btn-ghost btn-sm" id="clear-upset-search-btn" style="margin-top:8px;">Clear</button>
        </div>
      ` : ''}
    `;
    const input = document.getElementById('upset-search-input');
    let debounceTimer;
    input.oninput = () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => runUpsetSearch(input.value, week, games), 400);
    };
    if (_upsetSelection) {
      document.getElementById('clear-upset-search-btn').onclick = () => {
        _upsetSelection = null;
        clearAllUpsetFlags();
        renderPicksBoard(document.getElementById('content'), week, games);
      };
    }
  }
}

function clearAllUpsetFlags() {
  Object.keys(_draftPicks).forEach(gid => { if (_draftPicks[gid]) _draftPicks[gid].isUpset = false; });
}

async function runUpsetSearch(query, week, games) {
  if (query.trim().length < 2) { document.getElementById('upset-search-results').innerHTML = ''; return; }
  const resultsEl = document.getElementById('upset-search-results');
  resultsEl.innerHTML = '<div class="helptext">Searching...</div>';
  try {
    const data = await api('searchEspnGames', { query });
    _upsetSearchResults = data.results;
    if (_upsetSearchResults.length === 0) {
      resultsEl.innerHTML = '<div class="helptext">No games found. Try another team name.</div>';
      return;
    }
    resultsEl.innerHTML = _upsetSearchResults.map((r, i) => `
      <div class="search-result-row" data-idx="${i}">
        <div style="display:flex; align-items:center; gap:10px;">
          <div style="display:flex; align-items:center;">
            ${renderTeamLogo(r.awayLogo, r.awayTeam)}
            <span style="margin-left:-6px; z-index:1;">${renderTeamLogo(r.homeLogo, r.homeTeam)}</span>
          </div>
          <div>
            <div class="matchup">${escapeHtml(r.awayTeam)} @ ${escapeHtml(r.homeTeam)}</div>
            <div class="helptext">${r.favorite ? escapeHtml(r.favorite) + ' favored' : 'No line yet'}</div>
          </div>
        </div>
        <div class="line">${r.favorite ? '+' + fmtSpread(r.spread) : '—'}</div>
      </div>
    `).join('');
    resultsEl.querySelectorAll('.search-result-row').forEach(row => {
      row.onclick = () => {
        const r = _upsetSearchResults[Number(row.dataset.idx)];
        if (!r.favorite) { showToast('This game has no line posted yet — try another', 'error'); return; }
        const dog = isFavorite({ favorite: r.favorite, homeTeam: r.homeTeam }, r.homeTeam) ? r.awayTeam : r.homeTeam;
        clearAllUpsetFlags();
        _upsetSelection = { espnEventId: r.espnEventId, awayTeam: r.awayTeam, homeTeam: r.homeTeam, favorite: r.favorite, spread: r.spread, kickoff: r.kickoff, pickedTeam: dog, homeLogo: r.homeLogo, awayLogo: r.awayLogo };
        renderPicksBoard(document.getElementById('content'), week, games);
      };
    });
  } catch (e) {
    resultsEl.innerHTML = '<div class="helptext">Search failed. Try again.</div>';
  }
}

function updateBoardHeader() {
  const straightCount = Object.keys(_draftPicks).filter(gid => _draftPicks[gid].pickedTeam && !_draftPicks[gid].isUpset).length;
  const hasUpset = Object.keys(_draftPicks).some(gid => _draftPicks[gid].isUpset) || _upsetSelection;
  const countEl = document.getElementById('picked-count-display');
  const upsetEl = document.getElementById('upset-status-display');
  if (countEl) countEl.textContent = `${straightCount} / 10 picked`;
  if (upsetEl) upsetEl.textContent = hasUpset ? 'Selected' : 'Not Set';
}

async function submitMyPicks(week, games) {
  const picks = games.map(g => {
    const d = _draftPicks[g.gameId];
    return (d && d.pickedTeam && !d.isUpset) ? { gameId: g.gameId, pickedTeam: d.pickedTeam, isUpset: false } : null;
  }).filter(Boolean);

  if (picks.length !== 10) { showToast('Pick all 10 games before submitting', 'error'); return; }

  let upsetPick = null;
  if (_upsetMode === 'board') {
    const upsetGameId = Object.keys(_draftPicks).find(gid => _draftPicks[gid].isUpset);
    if (!upsetGameId) { showToast('Select your Upset Special pick', 'error'); return; }
    upsetPick = { gameId: upsetGameId, pickedTeam: _draftPicks[upsetGameId].pickedTeam, isUpset: true };
  } else {
    if (!_upsetSelection) { showToast('Search and select your Upset Special pick', 'error'); return; }
    upsetPick = {
      gameId: _upsetSelection.gameId || '', espnEventId: _upsetSelection.espnEventId,
      awayTeam: _upsetSelection.awayTeam, homeTeam: _upsetSelection.homeTeam,
      favorite: _upsetSelection.favorite, spread: _upsetSelection.spread, kickoff: _upsetSelection.kickoff,
      pickedTeam: _upsetSelection.pickedTeam, isUpset: true,
      homeLogo: _upsetSelection.homeLogo, awayLogo: _upsetSelection.awayLogo
    };
  }
  picks.push(upsetPick);

  const btn = document.getElementById('submit-picks-btn');
  btn.innerHTML = '<span class="spinner" style="border-top-color:#1A1206;"></span>';
  try {
    await api('submitPicks', { week, playerId: State.player.id, picks });
    showToast('Picks locked in', 'success');
    await refreshState();
    renderContent();
  } catch (e) {
    btn.innerHTML = 'Submit My Picks';
  }
}
</script>
<script>
/* ============================================================
   STANDINGS VIEW (regular season)
   ============================================================ */
function computeStandingsLocally() {
  const players = State.players.filter(p => p.active);
  const finalGames = State.games.filter(isGameFinal);
  const standings = {};
  players.forEach(p => standings[p.id] = {
    playerId: p.id, name: p.name, teamName: p.teamName,
    points: Number(p.careerPoints) || 0, correct: 0, upsetWins: 0, upsetAttempts: 0, weeklyBreakdown: {}
  });

  finalGames.forEach(g => {
    const result = computeGameResult(g);
    const dog = underdogOf(g);
    const spread = Number(g.spread) || 0;
    const gamePicks = State.picks.filter(p => p.gameId === g.gameId);
    gamePicks.forEach(p => {
      if (!standings[p.playerId]) return;
      const wk = Number(p.week);
      if (!standings[p.playerId].weeklyBreakdown[wk]) standings[p.playerId].weeklyBreakdown[wk] = 0;
      const isUpset = p.isUpset === true || p.isUpset === 'TRUE';
      if (isUpset) {
        standings[p.playerId].upsetAttempts += 1;
        if (result.winner === dog) {
          standings[p.playerId].points += spread;
          standings[p.playerId].upsetWins += 1;
          standings[p.playerId].weeklyBreakdown[wk] += spread;
        }
      } else if (result.winner === p.pickedTeam) {
        standings[p.playerId].points += 1;
        standings[p.playerId].correct += 1;
        standings[p.playerId].weeklyBreakdown[wk] += 1;
      }
    });
  });

  return Object.values(standings).sort((a, b) => b.points - a.points);
}

function renderStandings(content) {
  const standings = computeStandingsLocally();
  content.innerHTML = `
    <div class="card">
      <div class="card-title">Season Standings</div>
      ${standings.length === 0 ? '<div class="empty-state"><p>No completed games yet this season.</p></div>' : standings.map((s, i) => `
        <div class="standing-row ${i === 0 ? 'rank-1' : ''}">
          <div class="standing-rank">${i + 1}</div>
          <div style="flex:1;">
            <div class="standing-name">${escapeHtml(s.teamName || s.name)}</div>
            <div class="standing-meta">${escapeHtml(s.name)} &middot; ${s.correct} correct &middot; ${s.upsetWins}/${s.upsetAttempts} upset specials hit</div>
          </div>
          <div class="standing-points ${i === 0 ? 'pulse-update' : ''}">${s.points % 1 === 0 ? s.points : s.points.toFixed(1)}</div>
        </div>
      `).join('')}
    </div>
    <p class="helptext" style="text-align:center;">1 pt per correct pick &middot; Upset Special pays out at the underdog's line if it wins outright.</p>
  `;
}

/* ============================================================
   MONEY / POT VIEW (regular season)
   ============================================================ */
function renderMoney(content) {
  const entryFee = Number(State.season.entryFee || 0);
  const weeklyPrize = Number(State.season.weeklyPrize || 0);
  const perfectBonus = Number(State.season.perfectWeekBonus || 0);
  const pct1 = Number(State.season.seasonPayout1stPct || 0);
  const pct2 = Number(State.season.seasonPayout2ndPct || 0);
  const pct3 = Number(State.season.seasonPayout3rdPct || 0);
  const activePlayers = State.players.filter(p => p.active);
  const totalPot = entryFee * activePlayers.length;

  const balances = activePlayers.map(p => {
    const entries = State.ledger.filter(l => l.playerId === p.id);
    const paid = entries.filter(e => e.type === 'paid').reduce((sum, e) => sum + Number(e.amount), 0);
    const payouts = entries.filter(e => e.type === 'payout' || e.type === 'weekly_prize' || e.type === 'perfect_bonus').reduce((sum, e) => sum + Number(e.amount), 0);
    const owed = Math.max(entryFee - paid, 0);
    return { ...p, paid, payouts, owed };
  });

  const totalCollected = balances.reduce((sum, b) => sum + b.paid, 0);
  const totalOwed = balances.reduce((sum, b) => sum + b.owed, 0);
  const totalPaidOut = balances.reduce((sum, b) => sum + b.payouts, 0);

  content.innerHTML = `
    <div class="card" style="background:var(--surface-3); color:#fff;">
      <div style="display:flex; gap:14px;">
        <div style="flex:1; text-align:center;">
          <div class="mono" style="font-size:22px; font-weight:700;">$${totalPot}</div>
          <div style="font-size:10px; color:rgba(255,255,255,0.6); text-transform:uppercase; letter-spacing:0.04em;">Full Pot</div>
        </div>
        <div style="flex:1; text-align:center; border-left:1px solid rgba(255,255,255,0.15); border-right:1px solid rgba(255,255,255,0.15);">
          <div class="mono" style="font-size:22px; font-weight:700; color:var(--win);">$${totalCollected}</div>
          <div style="font-size:10px; color:rgba(255,255,255,0.6); text-transform:uppercase; letter-spacing:0.04em;">Collected</div>
        </div>
        <div style="flex:1; text-align:center;">
          <div class="mono" style="font-size:22px; font-weight:700; color:${totalOwed > 0 ? '#E8B4AC' : 'var(--win)'};">$${totalOwed}</div>
          <div style="font-size:10px; color:rgba(255,255,255,0.6); text-transform:uppercase; letter-spacing:0.04em;">Outstanding</div>
        </div>
      </div>
    </div>
    <div class="section-label">Prize Structure</div>
    <div class="card">
      <p class="helptext"><strong style="color:var(--text)">Weekly:</strong> $${weeklyPrize} to the week's high scorer (split evenly on ties).</p>
      <p class="helptext" style="margin-top:6px;"><strong style="color:var(--text)">Perfect Week Bonus:</strong> $${perfectBonus} to anyone who gets all 10 straight picks correct.</p>
      <p class="helptext" style="margin-top:6px;"><strong style="color:var(--text)">Season-End:</strong> 1st ${pct1}% &middot; 2nd ${pct2}% &middot; 3rd ${pct3}% of the full pot.</p>
      <p class="helptext" style="margin-top:8px;">Total paid out so far: <span class="mono">$${totalPaidOut}</span></p>
    </div>
    <div class="section-label">Buy-In Status &middot; $${entryFee}/player</div>
    <div class="card">
      <table class="simple">
        <thead><tr><th>Team</th><th>Paid</th><th>Owed</th></tr></thead>
        <tbody>
          ${balances.map(b => `
            <tr>
              <td>${escapeHtml(b.teamName || b.name)}${b.id === State.player.id ? ' <span style="color:var(--text-soft); font-size:11px;">(you)</span>' : ''}</td>
              <td class="mono">$${b.paid}</td>
              <td class="mono" style="color:${b.owed > 0 ? 'var(--loss)' : 'var(--win)'};">${b.owed > 0 ? '$' + b.owed : 'Paid'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}
</script>
<script>
/* ============================================================
   BOWL BONANZA — player view
   ============================================================ */
let _bowlDraftPicks = {};  // gameId -> {pickedTeam, isUpset}
let _bowlUpsetGameIds = []; // tracks which 2 games are flagged upset (round1 only)

const BOWL_PHASE_LABELS = { round1: 'First Round', quarter: 'Quarter Round', semi: 'Semifinals', champion: 'Champion Pick', standings: 'Standings' };
const BOWL_PHASE_POINTS = { round1: 1, quarter: 3, semi: 4, champion: 5 };

function getBowlGamesForPhase(phase) { return (State.bowlGames || []).filter(g => g.phase === phase); }
function isBowlPhasePosted(phase) {
  const games = getBowlGamesForPhase(phase);
  return games.length > 0 && games.every(isGameLocked);
}
function getMyBowlPicksForPhase(phase) { return (State.bowlPicks || []).filter(p => p.phase === phase && p.playerId === State.player.id); }
function getMyBowlChampionPick() { return (State.bowlChampion || []).find(c => c.playerId === State.player.id); }

function renderBowl(content) {
  const tabs = ['round1', 'quarter', 'semi', 'champion', 'standings'];
  content.innerHTML = `
    <div class="card" style="background:var(--upset-grad); color:#fff;">
      <div style="font-size:11px; text-transform:uppercase; letter-spacing:0.08em; opacity:0.85;">Season Finale</div>
      <div style="font-family:var(--font-display); font-size:22px; margin-top:2px;">Bowl Bonanza</div>
      <div class="helptext" style="color:rgba(255,255,255,0.85); margin-top:4px;">Separate contest, separate $${Number(State.season.bowlEntryFee || 25)} pot.</div>
    </div>
    <div class="tab-row" style="flex-wrap:wrap;">
      ${tabs.map(t => `<button data-bowltab="${t}" class="${State.bowlSubView === t ? 'active' : ''}" style="flex:1 1 30%;">${BOWL_PHASE_LABELS[t]}</button>`).join('')}
    </div>
    <div id="bowl-tab-content"></div>
  `;
  content.querySelectorAll('[data-bowltab]').forEach(btn => {
    btn.onclick = () => { State.bowlSubView = btn.dataset.bowltab; renderBowl(content); };
  });
  const tabContent = document.getElementById('bowl-tab-content');
  if (State.bowlSubView === 'standings') renderBowlStandingsTab(tabContent);
  else if (State.bowlSubView === 'champion') renderBowlChampionTab(tabContent);
  else renderBowlPhaseTab(tabContent, State.bowlSubView);
}

function renderBowlPhaseTab(el, phase) {
  const games = getBowlGamesForPhase(phase);
  const posted = isBowlPhasePosted(phase);
  const pointValue = BOWL_PHASE_POINTS[phase];
  const expectedUpsets = phase === 'round1' ? 2 : 0;

  if (games.length === 0) {
    el.innerHTML = `<div class="empty-state"><h3>${BOWL_PHASE_LABELS[phase]} not set up yet</h3><p>Check back once the commissioner posts these games.</p></div>`;
    return;
  }
  if (!posted) {
    el.innerHTML = `<div class="empty-state"><h3>${BOWL_PHASE_LABELS[phase]} not posted yet</h3><p>The commissioner is still setting lines for these games.</p></div>`;
    return;
  }

  const existingPicks = getMyBowlPicksForPhase(phase);
  if (existingPicks.length > 0 && Object.keys(_bowlDraftPicks).filter(gid => games.find(g => g.gameId === gid)).length === 0) {
    existingPicks.forEach(p => {
      const isUpset = p.isUpset === true || p.isUpset === 'TRUE';
      _bowlDraftPicks[p.gameId] = { pickedTeam: p.pickedTeam, isUpset };
      if (isUpset && !_bowlUpsetGameIds.includes(p.gameId)) _bowlUpsetGameIds.push(p.gameId);
    });
  }

  const pickedCount = games.filter(g => _bowlDraftPicks[g.gameId] && _bowlDraftPicks[g.gameId].pickedTeam).length;
  const upsetCount = games.filter(g => _bowlDraftPicks[g.gameId] && _bowlDraftPicks[g.gameId].isUpset).length;

  el.innerHTML = `
    <div class="card">
      <div class="flex-between">
        <span class="phase-badge">${BOWL_PHASE_LABELS[phase]} <span class="phase-pts">${pointValue} pt${pointValue > 1 ? 's' : ''}/game</span></span>
        <span class="helptext">${pickedCount}/${games.length} picked${expectedUpsets ? ` &middot; ${upsetCount}/${expectedUpsets} upsets` : ''}</span>
      </div>
    </div>
    <div id="bowl-games-list"></div>
    <button class="btn btn-gold btn-block" id="submit-bowl-picks-btn" style="margin-top:6px;">${existingPicks.length > 0 ? 'Update Picks' : 'Submit Picks'}</button>
  `;
  renderBowlGamesList(games, phase, expectedUpsets);
  document.getElementById('submit-bowl-picks-btn').onclick = () => submitBowlPicksForPhase(phase, games, expectedUpsets);
}

function renderBowlGamesList(games, phase, expectedUpsets) {
  const wrap = document.getElementById('bowl-games-list');
  wrap.innerHTML = games.map(g => {
    const draft = _bowlDraftPicks[g.gameId] || {};
    const favTeam = g.favorite;
    const dog = underdogOf(g);
    const result = computeGameResult(g);
    const locked = isGamePickLocked(g);
    const isUpsetActive = draft.isUpset;

    let resultStrip = '';
    if (result.isFinal) {
      resultStrip = `<div class="result-strip"><span class="mono" style="color:var(--text-soft);">${escapeHtml(g.awayTeam)} ${result.awayScore} – ${result.homeScore} ${escapeHtml(g.homeTeam)}</span>
        ${draft.pickedTeam ? `<span class="result-pill ${draft.isUpset ? (result.winner === dog ? 'upset-win' : 'loss') : (result.winner === draft.pickedTeam ? 'win' : 'loss')}">
          ${draft.isUpset ? (result.winner === dog ? 'Upset hit +' + fmtSpread(g.spread) : 'Upset miss') : (result.winner === draft.pickedTeam ? 'Correct' : 'Incorrect')}
        </span>` : ''}</div>`;
    }

    return `
      <div class="game-row ${isUpsetActive ? 'is-upset-selected' : ''}" data-gameid="${g.gameId}">
        <div class="flex-between" style="margin-bottom:6px;">${renderCountdownBadge(g)}</div>
        <div class="game-matchup">
          <div class="team-pick ${draft.pickedTeam === g.awayTeam ? 'selected' : ''}" data-gameid="${g.gameId}" data-team="${escapeHtml(g.awayTeam)}" style="${locked ? 'opacity:0.55; cursor:default;' : ''}">
            <div class="team-logo-row">
              ${renderTeamLogo(g.awayLogo, g.awayTeam)}
              <div><div class="tname">${escapeHtml(g.awayTeam)}</div>${favTeam === g.awayTeam ? '<div class="fav-badge">Favorite</div>' : ''}</div>
            </div>
            <div class="tline">${favTeam === g.awayTeam ? '-' + fmtSpread(g.spread) : '+' + fmtSpread(g.spread)}</div>
          </div>
          <div class="vs-divider">@</div>
          <div class="team-pick ${draft.pickedTeam === g.homeTeam ? 'selected' : ''}" data-gameid="${g.gameId}" data-team="${escapeHtml(g.homeTeam)}" style="${locked ? 'opacity:0.55; cursor:default;' : ''}">
            <div class="team-logo-row">
              ${renderTeamLogo(g.homeLogo, g.homeTeam)}
              <div><div class="tname">${escapeHtml(g.homeTeam)}</div>${favTeam === g.homeTeam ? '<div class="fav-badge">Favorite</div>' : ''}</div>
            </div>
            <div class="tline">${favTeam === g.homeTeam ? '-' + fmtSpread(g.spread) : '+' + fmtSpread(g.spread)}</div>
          </div>
        </div>
        ${expectedUpsets > 0 ? `
          <div class="upset-toggle ${isUpsetActive ? 'active' : ''}" data-gameid="${g.gameId}" data-dog="${escapeHtml(dog)}" style="${locked ? 'opacity:0.5;' : ''}">
            <div class="label"><span class="upset-checkbox">${isUpsetActive ? '✓' : ''}</span> Upset: ${escapeHtml(dog)}</div>
            <div class="points">+${fmtSpread(g.spread)} pts</div>
          </div>` : ''}
        ${resultStrip}
      </div>`;
  }).join('');

  wrap.querySelectorAll('.team-pick').forEach(el => {
    if (el.style.cursor === 'default') return;
    el.onclick = () => {
      const gameId = el.dataset.gameid;
      const team = el.dataset.team;
      const game = games.find(g => g.gameId === gameId);
      if (isGamePickLocked(game)) { showToast('This game has locked', 'error'); return; }
      if (!_bowlDraftPicks[gameId]) _bowlDraftPicks[gameId] = {};
      // if this game is currently flagged upset and the newly picked team is the favorite, drop the flag
      if (_bowlDraftPicks[gameId].isUpset && isFavorite(game, team)) {
        _bowlDraftPicks[gameId].isUpset = false;
        _bowlUpsetGameIds = _bowlUpsetGameIds.filter(id => id !== gameId);
      }
      _bowlDraftPicks[gameId].pickedTeam = team;
      renderBowlGamesList(games, phase, expectedUpsets);
    };
  });

  wrap.querySelectorAll('.upset-toggle').forEach(el => {
    if (el.style.cursor === 'default' && el.style.opacity === '0.5') { /* still allow click feedback */ }
    el.onclick = () => {
      const gameId = el.dataset.gameid;
      const dog = el.dataset.dog;
      const game = games.find(g => g.gameId === gameId);
      if (isGamePickLocked(game)) { showToast('This game has locked', 'error'); return; }
      const wasActive = _bowlDraftPicks[gameId] && _bowlDraftPicks[gameId].isUpset;
      if (wasActive) {
        _bowlDraftPicks[gameId].isUpset = false;
        _bowlUpsetGameIds = _bowlUpsetGameIds.filter(id => id !== gameId);
      } else {
        if (_bowlUpsetGameIds.length >= expectedUpsets) {
          showToast(`You can only select ${expectedUpsets} Upset Special picks`, 'error');
          return;
        }
        if (!_bowlDraftPicks[gameId]) _bowlDraftPicks[gameId] = {};
        _bowlDraftPicks[gameId].pickedTeam = dog;
        _bowlDraftPicks[gameId].isUpset = true;
        _bowlUpsetGameIds.push(gameId);
      }
      renderBowlGamesList(games, phase, expectedUpsets);
    };
  });
}

async function submitBowlPicksForPhase(phase, games, expectedUpsets) {
  const picks = games.map(g => {
    const d = _bowlDraftPicks[g.gameId];
    return (d && d.pickedTeam) ? { gameId: g.gameId, pickedTeam: d.pickedTeam, isUpset: !!d.isUpset } : null;
  }).filter(Boolean);

  if (picks.length !== games.length) { showToast(`Pick all ${games.length} games before submitting`, 'error'); return; }
  const upsetCount = picks.filter(p => p.isUpset).length;
  if (upsetCount !== expectedUpsets) { showToast(`This phase requires exactly ${expectedUpsets} Upset Special pick(s)`, 'error'); return; }

  const btn = document.getElementById('submit-bowl-picks-btn');
  btn.innerHTML = '<span class="spinner" style="border-top-color:#1A1206;"></span>';
  try {
    await api('submitBowlPicks', { phase, playerId: State.player.id, picks });
    showToast('Bowl picks locked in', 'success');
    await refreshState();
    renderContent();
  } catch (e) { btn.innerHTML = 'Submit Picks'; }
}

/* ---- Champion pick ---- */
function renderBowlChampionTab(el) {
  const semiGames = getBowlGamesForPhase('semi');
  if (semiGames.length === 0 || !isBowlPhasePosted('semi')) {
    el.innerHTML = `<div class="empty-state"><h3>Champion pick not open yet</h3><p>This unlocks once the Semifinal matchups are posted — pick your National Champion from the remaining 4 teams.</p></div>`;
    return;
  }
  const teams = [];
