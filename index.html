  semiGames.forEach(g => { teams.push(g.awayTeam); teams.push(g.homeTeam); });
  const myPick = getMyBowlChampionPick();

  el.innerHTML = `
    <div class="champion-card">
      <div class="phase-badge" style="margin-bottom:10px;">National Champion <span class="phase-pts">5 pts</span></div>
      <p class="helptext" style="margin-bottom:12px;">Pick the team you think wins it all.</p>
      ${teams.map(t => `<div class="champion-team-pick ${myPick && myPick.teamPicked === t ? 'selected' : ''}" data-team="${escapeHtml(t)}">${escapeHtml(t)}</div>`).join('')}
      <button class="btn btn-gold btn-block" id="submit-champion-btn" style="margin-top:10px;">${myPick ? 'Update Pick' : 'Submit Pick'}</button>
    </div>
  `;
  let selectedTeam = myPick ? myPick.teamPicked : null;
  el.querySelectorAll('.champion-team-pick').forEach(div => {
    div.onclick = () => {
      selectedTeam = div.dataset.team;
      el.querySelectorAll('.champion-team-pick').forEach(d => d.classList.toggle('selected', d.dataset.team === selectedTeam));
    };
  });
  document.getElementById('submit-champion-btn').onclick = async () => {
    if (!selectedTeam) { showToast('Select a team first', 'error'); return; }
    try {
      await api('submitBowlChampion', { playerId: State.player.id, teamPicked: selectedTeam });
      showToast('Champion pick saved', 'success');
      await refreshState();
      renderContent();
    } catch (e) {}
  };
}

/* ---- Bowl standings ---- */
function computeBowlStandingsLocally() {
  const players = State.players.filter(p => p.active);
  const finalGames = State.bowlGames.filter(isGameFinal);
  const champPicks = State.bowlChampion || [];
  const actualChampion = State.season.bowlChampionWinner || '';

  const standings = {};
  players.forEach(p => standings[p.id] = { playerId: p.id, name: p.name, teamName: p.teamName, points: 0, round1Correct: 0, upsetWins: 0, championCorrect: false });

  finalGames.forEach(g => {
    const result = computeGameResult(g);
    const dog = underdogOf(g);
    const spread = Number(g.spread) || 0;
    const pointValue = BOWL_PHASE_POINTS[g.phase] || 1;
    const gamePicks = State.bowlPicks.filter(p => p.gameId === g.gameId);
    gamePicks.forEach(p => {
      if (!standings[p.playerId]) return;
      const isUpset = p.isUpset === true || p.isUpset === 'TRUE';
      if (isUpset) {
        if (result.winner === dog) { standings[p.playerId].points += spread; standings[p.playerId].upsetWins += 1; }
      } else if (result.winner === p.pickedTeam) {
        standings[p.playerId].points += pointValue;
        if (g.phase === 'round1') standings[p.playerId].round1Correct += 1;
      }
    });
  });

  if (actualChampion) {
    champPicks.forEach(c => {
      if (!standings[c.playerId]) return;
      if (c.teamPicked === actualChampion) { standings[c.playerId].points += 5; standings[c.playerId].championCorrect = true; }
    });
  }

  return Object.values(standings).sort((a, b) => b.points - a.points || b.round1Correct - a.round1Correct);
}

function renderBowlStandingsTab(el) {
  const standings = computeBowlStandingsLocally();
  el.innerHTML = `
    <div class="card">
      <div class="card-title">Bowl Bonanza Standings</div>
      ${standings.length === 0 ? '<div class="empty-state"><p>No completed bowl games yet.</p></div>' : standings.map((s, i) => `
        <div class="standing-row ${i === 0 ? 'rank-1' : ''}">
          <div class="standing-rank">${i + 1}</div>
          <div style="flex:1;">
            <div class="standing-name">${escapeHtml(s.teamName || s.name)}${s.championCorrect ? ' 🏆' : ''}</div>
            <div class="standing-meta">${s.round1Correct}/41 first round &middot; ${s.upsetWins}/2 upsets hit</div>
          </div>
          <div class="standing-points ${i === 0 ? 'pulse-update' : ''}">${s.points % 1 === 0 ? s.points : s.points.toFixed(1)}</div>
        </div>
      `).join('')}
    </div>
    <p class="helptext" style="text-align:center;">Tiebreaker: most correct picks among the 41 first-round games.</p>
  `;
}
</script>
<script>
/* ============================================================
   ADMIN VIEW
   ============================================================ */
let _adminTab = 'week';
let _bowlAdminPhaseDraft = []; // for entering quarter/semi matchups manually
let _bowlRound1DateRange = { start: '', end: '' };

function renderAdmin(content) {
  const tabs = [
    { id: 'week', label: 'This Week' },
    { id: 'players', label: 'Players' },
    { id: 'ledger', label: 'Pot' },
    { id: 'season', label: 'Season' },
    { id: 'bowladmin', label: 'Bowl' }
  ];
  content.innerHTML = `
    <div class="tab-row" style="flex-wrap:wrap;">${tabs.map(t => `<button data-tab="${t.id}" class="${_adminTab === t.id ? 'active' : ''}" style="flex:1 1 30%;">${t.label}</button>`).join('')}</div>
    <div id="admin-tab-content"></div>
  `;
  content.querySelectorAll('.tab-row button').forEach(btn => { btn.onclick = () => { _adminTab = btn.dataset.tab; renderAdmin(content); }; });
  const tabContent = document.getElementById('admin-tab-content');
  if (_adminTab === 'week') renderAdminWeek(tabContent);
  if (_adminTab === 'players') renderAdminPlayers(tabContent);
  if (_adminTab === 'ledger') renderAdminLedger(tabContent);
  if (_adminTab === 'season') renderAdminSeason(tabContent);
  if (_adminTab === 'bowladmin') renderAdminBowl(tabContent);
}

/* ---- Admin: This Week ---- */
function renderAdminWeek(el) {
  const week = currentWeek();
  const rotation = getRotationForWeek(week);
  const games = getGamesForWeek(week);
  const posted = isWeekPosted(week);
  const picker = rotation ? getPlayerById(rotation.playerId) : null;
  const eligible = State.players.filter(p => p.active);

  el.innerHTML = `
    <div class="card">
      <div class="flex-between" style="margin-bottom:10px;">
        <div class="card-title" style="margin-bottom:0;">Week ${week} &middot; Picker</div>
        <button class="btn btn-ghost btn-sm" id="week-jump">‹ Wk</button>
      </div>
      <select id="picker-select" style="width:100%; padding:10px; border-radius:9px; border:1.5px solid var(--hairline);">
        <option value="">— Select picker —</option>
        ${eligible.map(p => `<option value="${p.id}" ${rotation && rotation.playerId === p.id ? 'selected' : ''}>${escapeHtml(p.teamName || p.name)}</option>`).join('')}
      </select>
      <div class="row2" style="margin-top:10px;">
        <button class="btn btn-primary btn-sm" id="assign-picker-btn">Assign</button>
        <button class="btn btn-ghost btn-sm" id="random-picker-btn">🎲 Random Pick</button>
      </div>
      ${picker ? `<p class="helptext" style="margin-top:10px;">Current picker: <strong>${escapeHtml(picker.teamName || picker.name)}</strong> &middot; Status: ${rotation.status}</p>` : ''}
    </div>

    ${games.length > 0 ? renderAdminGamesCard(games, posted) : '<div class="card"><p class="helptext">No games submitted for this week yet.</p></div>'}

    ${games.length > 0 && !posted ? `<button class="btn btn-gold btn-block" id="post-week-btn">Post This Week's Board</button>` : ''}

    ${posted ? `
      <div class="section-label">Results</div>
      <div class="card">
        <button class="btn btn-primary btn-block" id="fetch-results-btn">Fetch Final Scores (ESPN)</button>
        <p class="helptext" style="margin-top:10px;">Pulls final scores once games are complete. Override manually below if needed.</p>
      </div>
      <div class="card">
        <button class="btn btn-ghost btn-block" id="apply-defaults-btn">Apply "Favorite" Default for Missing Picks</button>
        <p class="helptext" style="margin-top:8px;">Use once the week has started — fills in the favorite for anyone who didn't submit picks, per league rule.</p>
      </div>
    ` : ''}
  `;

  document.getElementById('week-jump').onclick = () => {
    const w = prompt('Jump to week #:', week);
    if (w && !isNaN(Number(w))) adminSetSeasonField('currentWeek', Number(w));
  };
  document.getElementById('assign-picker-btn').onclick = async () => {
    const playerId = document.getElementById('picker-select').value;
    if (!playerId) { showToast('Select a player first', 'error'); return; }
    await api('adminAssignPicker', { adminId: State.player.id, week, playerId });
    showToast('Picker assigned', 'success');
    await refreshState(); renderAdmin(document.getElementById('content'));
  };
  document.getElementById('random-picker-btn').onclick = async () => {
    const data = await api('adminRandomPicker', { adminId: State.player.id, week });
    showToast(`${data.playerName} randomly selected as picker`, 'success');
    await refreshState(); renderAdmin(document.getElementById('content'));
  };
  if (games.length > 0 && !posted) {
    document.getElementById('post-week-btn').onclick = async () => {
      try {
        await api('adminPostWeek', { adminId: State.player.id, week });
        showToast('Week posted! Players can pick now.', 'success');
        await refreshState(); renderAdmin(document.getElementById('content'));
      } catch (e) {}
    };
    const fetchBtn = document.getElementById('fetch-espn-lines-btn');
    if (fetchBtn) fetchBtn.onclick = async () => {
      fetchBtn.innerHTML = '<span class="spinner" style="border-top-color:#fff;"></span>';
      try {
        const data = await api('adminFetchEspnLines', { adminId: State.player.id, week });
        const matched = data.updated.filter(u => u.matched).length;
        showToast(`Matched ${matched}/${data.updated.length} games`, matched === data.updated.length ? 'success' : 'error');
        await refreshState(); renderAdmin(document.getElementById('content'));
      } catch (e) { fetchBtn.innerHTML = 'Fetch Lines from ESPN'; }
    };
    el.querySelectorAll('.manual-line-save').forEach(btn => {
      btn.onclick = async () => {
        const gameId = btn.dataset.gameid;
        const favSelect = el.querySelector(`select[data-gameid="${gameId}"]`);
        const spreadInput = el.querySelector(`input[data-spread="${gameId}"]`);
        const kickoffInput = el.querySelector(`input[data-kickoff="${gameId}"]`);
        await api('adminOverrideLine', { adminId: State.player.id, gameId, favorite: favSelect.value, spread: spreadInput.value, kickoff: kickoffInput.value ? new Date(kickoffInput.value).toISOString() : '' });
        showToast('Line updated', 'success');
        await refreshState(); renderAdmin(document.getElementById('content'));
      };
    });
  }
  if (posted) {
    document.getElementById('fetch-results-btn').onclick = async () => {
      const btn = document.getElementById('fetch-results-btn');
      btn.innerHTML = '<span class="spinner" style="border-top-color:#fff;"></span>';
      try {
        const data = await api('adminFetchResults', { adminId: State.player.id, week });
        const finals = data.updates.filter(u => u.final).length;
        showToast(`${finals}/${data.updates.length} games marked final`, 'success');
        await refreshState(); renderAdmin(document.getElementById('content'));
      } catch (e) { btn.innerHTML = 'Fetch Final Scores (ESPN)'; }
    };
    document.getElementById('apply-defaults-btn').onclick = async () => {
      try {
        const data = await api('adminApplyNoPickDefaults', { adminId: State.player.id, week });
        showToast(`${data.defaultsApplied} default picks applied`, 'success');
        await refreshState(); renderAdmin(document.getElementById('content'));
      } catch (e) {}
    };
    el.querySelectorAll('.manual-result-save').forEach(btn => {
      btn.onclick = async () => {
        const gameId = btn.dataset.gameid;
        const homeInput = el.querySelector(`input[data-result-home="${gameId}"]`);
        const awayInput = el.querySelector(`input[data-result-away="${gameId}"]`);
        await api('adminOverrideResult', { adminId: State.player.id, gameId, homeScore: homeInput.value, awayScore: awayInput.value });
        showToast('Result saved', 'success');
        await refreshState(); renderAdmin(document.getElementById('content'));
      };
    });
  }
}

function renderAdminGamesCard(games, posted) {
  return `
    <div class="section-label">Games &amp; Lines</div>
    ${!posted ? `<button class="btn btn-ghost btn-block" id="fetch-espn-lines-btn" style="margin-bottom:10px;">Fetch Lines from ESPN</button>` : ''}
    ${games.map(g => {
      const result = computeGameResult(g);
      const kickoffLocal = g.kickoff ? toLocalDatetimeInputValue(g.kickoff) : '';
      return `
      <div class="card" style="padding:12px 14px;">
        <div class="flex-between" style="margin-bottom:8px;">
          <strong style="font-size:14px;">${escapeHtml(g.awayTeam)} @ ${escapeHtml(g.homeTeam)}</strong>
          <span class="line-badge">${g.source === 'espn' ? 'ESPN' : (g.source === 'manual' ? 'Manual' : 'No line')}</span>
        </div>
        ${!posted ? `
          <div class="row2">
            <select data-gameid="${g.gameId}" style="padding:8px; border-radius:7px; border:1.5px solid var(--hairline);">
              <option value="">Favorite...</option>
              <option value="${escapeHtml(g.awayTeam)}" ${g.favorite === g.awayTeam ? 'selected' : ''}>${escapeHtml(g.awayTeam)}</option>
              <option value="${escapeHtml(g.homeTeam)}" ${g.favorite === g.homeTeam ? 'selected' : ''}>${escapeHtml(g.homeTeam)}</option>
            </select>
            <input type="number" step="0.5" data-spread="${g.gameId}" value="${g.spread || ''}" placeholder="Spread" class="editable-line-input" style="width:100%;">
          </div>
          <div class="field" style="margin-top:8px; margin-bottom:0;">
            <label>Kickoff</label>
            <input type="datetime-local" data-kickoff="${g.gameId}" value="${kickoffLocal}">
          </div>
          <button class="btn btn-ghost btn-sm manual-line-save" data-gameid="${g.gameId}" style="margin-top:8px;">Save Line &amp; Kickoff</button>
        ` : `
          <p class="helptext">${g.favorite ? escapeHtml(g.favorite) + ' favored by ' + fmtSpread(g.spread) : 'No line set'} ${g.kickoff ? '&middot; ' + new Date(g.kickoff).toLocaleString() : ''}</p>
        `}
        ${posted ? `
          <div class="divider" style="margin:10px 0;"></div>
          <div class="row2">
            <div style="display:flex; gap:6px; align-items:center;"><span class="helptext" style="white-space:nowrap;">${escapeHtml(g.awayTeam)}</span><input type="number" data-result-away="${g.gameId}" value="${result.isFinal ? result.awayScore : ''}" class="editable-line-input"></div>
            <div style="display:flex; gap:6px; align-items:center;"><span class="helptext" style="white-space:nowrap;">${escapeHtml(g.homeTeam)}</span><input type="number" data-result-home="${g.gameId}" value="${result.isFinal ? result.homeScore : ''}" class="editable-line-input"></div>
          </div>
          <button class="btn btn-ghost btn-sm manual-result-save" data-gameid="${g.gameId}" style="margin-top:8px;">Save Final Score</button>
          ${result.isFinal ? '<span class="pill pill-posted" style="margin-left:8px;">Final</span>' : ''}
        ` : ''}
      </div>
    `}).join('')}
  `;
}

function toLocalDatetimeInputValue(isoString) {
  const d = new Date(isoString);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

  await api('adminSetSeason', { adminId: State.player.id, [key]: value });
  await refreshState();
  renderAdmin(document.getElementById('content'));
}

<script>
/* ============================================================
   ADMIN: BOWL BONANZA
   ============================================================ */
function renderAdminBowl(el) {
  const phase = State.season.bowlCurrentPhase || 'round1';
  const phaseTabs = ['round1', 'quarter', 'semi', 'resolve'];
  const labels = { round1: 'First Round (41)', quarter: 'Quarter Round (4)', semi: 'Semis (2) + Champ', resolve: 'Resolve Champion' };
  if (!window._bowlAdminTab) window._bowlAdminTab = 'round1';

  el.innerHTML = `
    <div class="card" style="background:var(--upset-grad); color:#fff;">
      <div style="font-size:11px; text-transform:uppercase; letter-spacing:0.08em; opacity:0.85;">Bowl Bonanza Admin</div>
      <div class="helptext" style="color:rgba(255,255,255,0.9); margin-top:4px;">Current phase: <strong>${BOWL_PHASE_LABELS[phase] || phase}</strong></div>
    </div>
    <div class="tab-row" style="flex-wrap:wrap;">${phaseTabs.map(t => `<button data-bowladmintab="${t}" class="${window._bowlAdminTab === t ? 'active' : ''}" style="flex:1 1 45%;">${labels[t]}</button>`).join('')}</div>
    <div id="bowl-admin-phase-content"></div>
  `;
  el.querySelectorAll('[data-bowladmintab]').forEach(btn => { btn.onclick = () => { window._bowlAdminTab = btn.dataset.bowladmintab; renderAdminBowl(el); }; });
  const phaseContent = document.getElementById('bowl-admin-phase-content');
  if (window._bowlAdminTab === 'resolve') renderAdminBowlResolve(phaseContent);
  else renderAdminBowlPhaseSetup(phaseContent, window._bowlAdminTab);
}

function renderAdminBowlPhaseSetup(el, phase) {
  const games = getBowlGamesForPhase(phase);
  const posted = isBowlPhasePosted(phase);
  const expectedCounts = { round1: 41, quarter: 4, semi: 2 };
  const expected = expectedCounts[phase];

  if (games.length === 0) {
    if (!window._bowlSetupDraft || window._bowlSetupDraft.length !== expected) {
      window._bowlSetupDraft = Array.from({ length: expected }, () => ({ awayTeam: '', homeTeam: '' }));
    }
    el.innerHTML = `
      <div class="card">
        <div class="card-title">Set Up ${labelForPhase(phase)} Matchups</div>
        ${phase === 'round1' ? `
          <p class="helptext" style="margin-bottom:10px;">Enter all 41 bowl matchups below, or pull the schedule from ESPN by date range first to speed this up.</p>
          <div class="row2">
            <div class="field"><label>Start Date</label><input type="date" id="round1-start-date"></div>
            <div class="field"><label>End Date</label><input type="date" id="round1-end-date"></div>
          </div>
          <button class="btn btn-ghost btn-block" id="pull-bowl-schedule-btn" style="margin-bottom:10px;">Pull Bowl Schedule from ESPN</button>
        ` : `<p class="helptext" style="margin-bottom:10px;">Enter the ${expected} matchups for this round once the previous round's winners are known.</p>`}
      </div>
      <div id="bowl-setup-games"></div>
      <button class="btn btn-primary btn-block" id="save-bowl-games-btn">Save ${expected} Matchups</button>
    `;
    renderBowlSetupGames(phase, expected);
    if (phase === 'round1') {
      document.getElementById('pull-bowl-schedule-btn').onclick = () => pullBowlScheduleFromEspn(phase, expected);
    }
    document.getElementById('save-bowl-games-btn').onclick = () => saveBowlGamesSetup(phase);
    return;
  }

  el.innerHTML = `
    ${!posted ? `<button class="btn btn-ghost btn-block" id="fetch-bowl-lines-btn" style="margin-bottom:10px;">Fetch Lines from ESPN</button>` : ''}
    <div id="bowl-admin-games-list"></div>
    ${!posted ? `<button class="btn btn-gold btn-block" id="post-bowl-phase-btn">Post ${labelForPhase(phase)}</button>` : `
      <div class="section-label">Results</div>
      <div class="card">
        <button class="btn btn-primary btn-block" id="fetch-bowl-results-btn">Fetch Final Scores (ESPN)</button>
      </div>
      <div class="card">
        <button class="btn btn-ghost btn-block" id="apply-bowl-defaults-btn">Apply "Favorite" Default for Missing Picks</button>
      </div>
      <div class="card">
        <button class="btn btn-danger btn-block" id="reset-phase-btn">Clear &amp; Re-enter This Phase's Matchups</button>
        <p class="helptext" style="margin-top:8px;">Use this once this round's games are fully scored and you're ready to move to the next round.</p>
      </div>
    `}
  `;
  renderAdminBowlGamesList(games, posted, phase);

  if (!posted) {
    const fetchBtn = document.getElementById('fetch-bowl-lines-btn');
    fetchBtn.onclick = async () => {
      fetchBtn.innerHTML = '<span class="spinner" style="border-top-color:#fff;"></span>';
      try {
        const data = await api('adminFetchBowlEspnLines', { adminId: State.player.id, phase });
        const matched = data.updated.filter(u => u.matched).length;
        showToast(`Matched ${matched}/${data.updated.length} games`, 'success');
        await refreshState(); renderAdminBowl(document.getElementById('content'));
      } catch (e) { fetchBtn.innerHTML = 'Fetch Lines from ESPN'; }
    };
    document.getElementById('post-bowl-phase-btn').onclick = async () => {
      try {
        await api('adminPostBowlPhase', { adminId: State.player.id, phase });
        showToast(`${labelForPhase(phase)} posted!`, 'success');
        await refreshState(); renderAdminBowl(document.getElementById('content'));
      } catch (e) {}
    };
  } else {
    document.getElementById('fetch-bowl-results-btn').onclick = async () => {
      const btn = document.getElementById('fetch-bowl-results-btn');
      btn.innerHTML = '<span class="spinner" style="border-top-color:#fff;"></span>';
      try {
        const data = await api('adminFetchBowlResults', { adminId: State.player.id, phase });
        const finals = data.updates.filter(u => u.final).length;
        showToast(`${finals}/${data.updates.length} marked final`, 'success');
        await refreshState(); renderAdminBowl(document.getElementById('content'));
      } catch (e) { btn.innerHTML = 'Fetch Final Scores (ESPN)'; }
    };
    document.getElementById('apply-bowl-defaults-btn').onclick = async () => {
      try {
        const data = await api('adminApplyBowlNoPickDefaults', { adminId: State.player.id, phase });
        showToast(`${data.defaultsApplied} default picks applied`, 'success');
        await refreshState(); renderAdminBowl(document.getElementById('content'));
      } catch (e) {}
    };
    document.getElementById('reset-phase-btn').onclick = async () => {
      const warningExtra = phase === 'semi' ? ' This will also clear everyone\'s Champion picks since they depend on the Semifinal teams.' : '';
      if (!confirm(`This permanently clears all ${labelForPhase(phase)} games and picks so you can enter the next round.${warningExtra} Continue?`)) return;
      try {
        await api('adminClearBowlPhase', { adminId: State.player.id, phase });
        showToast(`${labelForPhase(phase)} cleared — re-enter matchups when ready`, 'success');
        window._bowlSetupDraft = null;
        await refreshState();
        renderAdminBowl(document.getElementById('content'));
      } catch (e) {}
    };
  }
}

function labelForPhase(phase) { return BOWL_PHASE_LABELS[phase] || phase; }

function renderBowlSetupGames(phase, count) {
  const wrap = document.getElementById('bowl-setup-games');
  wrap.innerHTML = window._bowlSetupDraft.map((g, i) => `
    <div class="card" style="padding:10px 14px;">
      <div class="helptext" style="margin-bottom:4px; font-weight:700;">GAME ${i + 1}</div>
      <div class="row2">
        <input type="text" value="${escapeHtml(g.awayTeam)}" data-idx="${i}" data-field="awayTeam" placeholder="Away team" style="padding:8px; border-radius:7px; border:1.5px solid var(--hairline);">
        <input type="text" value="${escapeHtml(g.homeTeam)}" data-idx="${i}" data-field="homeTeam" placeholder="Home team" style="padding:8px; border-radius:7px; border:1.5px solid var(--hairline);">
      </div>
    </div>
  `).join('');
  wrap.querySelectorAll('input').forEach(inp => {
    inp.oninput = () => { window._bowlSetupDraft[Number(inp.dataset.idx)][inp.dataset.field] = inp.value; };
  });
}

async function pullBowlScheduleFromEspn(phase, expected) {
  const start = document.getElementById('round1-start-date').value;
  const end = document.getElementById('round1-end-date').value;
  if (!start || !end) { showToast('Pick a start and end date first', 'error'); return; }
  const btn = document.getElementById('pull-bowl-schedule-btn');
  btn.innerHTML = '<span class="spinner"></span>';
  try {
    const data = await api('fetchEspnGamesByDateRange', {
      startDate: start.replace(/-/g, ''), endDate: end.replace(/-/g, '')
    });
    if (!data.games || data.games.length === 0) {
      showToast('No games found in that date range. Enter matchups manually below.', 'error');
      return;
    }
    // populate as many draft slots as we found, up to the expected count; admin can edit/trim afterward
    const found = data.games.slice(0, expected);
    window._bowlSetupDraft = Array.from({ length: expected }, (_, i) => found[i] ? { awayTeam: found[i].awayTeam, homeTeam: found[i].homeTeam } : { awayTeam: '', homeTeam: '' });
    renderBowlSetupGames(phase, expected);
    showToast(`Pulled ${found.length} games — review and edit before saving`, 'success');
  } catch (e) {
  } finally {
    btn.innerHTML = 'Pull Bowl Schedule from ESPN';
  }
}

async function saveBowlGamesSetup(phase) {
  const cleaned = window._bowlSetupDraft.map((g, i) => ({ slot: i + 1, awayTeam: g.awayTeam.trim(), homeTeam: g.homeTeam.trim() }));
  if (cleaned.some(g => !g.awayTeam || !g.homeTeam)) { showToast('Fill in every matchup before saving', 'error'); return; }
  const btn = document.getElementById('save-bowl-games-btn');
  btn.innerHTML = '<span class="spinner" style="border-top-color:#fff;"></span>';
  try {
    await api('adminSetBowlGames', { adminId: State.player.id, phase, games: cleaned });
    showToast(`${labelForPhase(phase)} matchups saved`, 'success');
    window._bowlSetupDraft = null;
    await refreshState();
    renderAdminBowl(document.getElementById('content'));
  } catch (e) { btn.innerHTML = `Save ${cleaned.length} Matchups`; }
}

function renderAdminBowlGamesList(games, posted, phase) {
  const wrap = document.getElementById('bowl-admin-games-list');
  wrap.innerHTML = games.map(g => {
    const result = computeGameResult(g);
    const kickoffLocal = g.kickoff ? toLocalDatetimeInputValue(g.kickoff) : '';
    return `
      <div class="card" style="padding:12px 14px;">
        <div class="flex-between" style="margin-bottom:8px;">
          <strong style="font-size:13px;">${escapeHtml(g.awayTeam)} @ ${escapeHtml(g.homeTeam)}</strong>
          <span class="line-badge">${g.source === 'espn' ? 'ESPN' : (g.source === 'manual' ? 'Manual' : 'No line')}</span>
        </div>
        ${!posted ? `
          <div class="row2">
            <select data-bowlgameid="${g.gameId}" style="padding:8px; border-radius:7px; border:1.5px solid var(--hairline);">
              <option value="">Favorite...</option>
              <option value="${escapeHtml(g.awayTeam)}" ${g.favorite === g.awayTeam ? 'selected' : ''}>${escapeHtml(g.awayTeam)}</option>
              <option value="${escapeHtml(g.homeTeam)}" ${g.favorite === g.homeTeam ? 'selected' : ''}>${escapeHtml(g.homeTeam)}</option>
            </select>
            <input type="number" step="0.5" data-bowlspread="${g.gameId}" value="${g.spread || ''}" placeholder="Spread" class="editable-line-input" style="width:100%;">
          </div>
          <div class="field" style="margin-top:8px; margin-bottom:0;"><label>Kickoff</label><input type="datetime-local" data-bowlkickoff="${g.gameId}" value="${kickoffLocal}"></div>
          <button class="btn btn-ghost btn-sm bowl-manual-line-save" data-gameid="${g.gameId}" style="margin-top:8px;">Save</button>
        ` : `<p class="helptext">${g.favorite ? escapeHtml(g.favorite) + ' favored by ' + fmtSpread(g.spread) : 'No line set'} ${g.kickoff ? '&middot; ' + new Date(g.kickoff).toLocaleString() : ''}</p>`}
        ${posted ? `
          <div class="divider" style="margin:10px 0;"></div>
          <div class="row2">
            <div style="display:flex; gap:6px; align-items:center;"><span class="helptext" style="white-space:nowrap;">${escapeHtml(g.awayTeam)}</span><input type="number" data-bowlresultaway="${g.gameId}" value="${result.isFinal ? result.awayScore : ''}" class="editable-line-input"></div>
            <div style="display:flex; gap:6px; align-items:center;"><span class="helptext" style="white-space:nowrap;">${escapeHtml(g.homeTeam)}</span><input type="number" data-bowlresulthome="${g.gameId}" value="${result.isFinal ? result.homeScore : ''}" class="editable-line-input"></div>
          </div>
          <button class="btn btn-ghost btn-sm bowl-manual-result-save" data-gameid="${g.gameId}" style="margin-top:8px;">Save Final Score</button>
          ${result.isFinal ? '<span class="pill pill-posted" style="margin-left:8px;">Final</span>' : ''}
        ` : ''}
      </div>`;
  }).join('');

  wrap.querySelectorAll('.bowl-manual-line-save').forEach(btn => {
    btn.onclick = async () => {
      const gameId = btn.dataset.gameid;
      const favSelect = wrap.querySelector(`select[data-bowlgameid="${gameId}"]`);
      const spreadInput = wrap.querySelector(`input[data-bowlspread="${gameId}"]`);
      const kickoffInput = wrap.querySelector(`input[data-bowlkickoff="${gameId}"]`);
      await api('adminOverrideBowlLine', { adminId: State.player.id, gameId, favorite: favSelect.value, spread: spreadInput.value, kickoff: kickoffInput.value ? new Date(kickoffInput.value).toISOString() : '' });
      showToast('Line updated', 'success');
      await refreshState(); renderAdminBowl(document.getElementById('content'));
    };
  });
  wrap.querySelectorAll('.bowl-manual-result-save').forEach(btn => {
    btn.onclick = async () => {
      const gameId = btn.dataset.gameid;
      const homeInput = wrap.querySelector(`input[data-bowlresulthome="${gameId}"]`);
      const awayInput = wrap.querySelector(`input[data-bowlresultaway="${gameId}"]`);
      await api('adminOverrideBowlResult', { adminId: State.player.id, gameId, homeScore: homeInput.value, awayScore: awayInput.value });
      showToast('Result saved', 'success');
      await refreshState(); renderAdminBowl(document.getElementById('content'));
    };
  });
}

/* ---- Resolve national champion (after the title game, outside the picks structure) ---- */
function renderAdminBowlResolve(el) {
  const semiGames = getBowlGamesForPhase('semi');
  const teams = [];
  semiGames.forEach(g => { teams.push(g.awayTeam); teams.push(g.homeTeam); });
  const current = State.season.bowlChampionWinner || '';

  el.innerHTML = `
    <div class="card">
      <div class="card-title">Resolve National Champion</div>
      <p class="helptext" style="margin-bottom:10px;">Once the championship game is decided, select the winner here. This awards 5 points to everyone who picked them as champion — it's tracked separately since the title game itself isn't one of the bracketed picks.</p>
      ${teams.length === 0 ? '<p class="helptext">Set up the Semifinals first — the champion options come from those 4 teams.</p>' : `
        <select id="champion-winner-select" style="width:100%; padding:10px; border-radius:9px; border:1.5px solid var(--hairline);">
          <option value="">— Select champion —</option>
          ${teams.map(t => `<option value="${escapeHtml(t)}" ${current === t ? 'selected' : ''}>${escapeHtml(t)}</option>`).join('')}
        </select>
        <button class="btn btn-gold btn-block" id="save-champion-winner-btn" style="margin-top:10px;">Save Champion</button>
      `}
      ${current ? `<p class="helptext" style="margin-top:10px;">Current champion of record: <strong>${escapeHtml(current)}</strong></p>` : ''}
    </div>
  `;
  if (teams.length > 0) {
    document.getElementById('save-champion-winner-btn').onclick = async () => {
      const winner = document.getElementById('champion-winner-select').value;
      if (!winner) { showToast('Select the champion first', 'error'); return; }
      await adminSetSeasonField('bowlChampionWinner', winner);
      showToast('Champion saved — standings updated', 'success');
    };
  }
}
</script>
